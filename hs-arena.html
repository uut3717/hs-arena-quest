<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>하스스톤 아레나 트래커</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* ════════════════ VARIABLES ════════════════ */
:root {
  --bg:#100e0a; --bg1:#181410; --bg2:#211c16; --bg3:#2a241c; --bg4:#332c22;
  --border:#3d3428; --border2:#56493a;
  --gold:#c8a84b; --gold2:#e8c96b; --gold3:#f5dfa0;
  --blue:#4a9eff; --red:#d44; --green:#4fc87a;
  --t-blue:#2a6fd4; --t-amber:#c8963e;   /* 계정 T=파랑, H=주황 */
  --text1:#e8dfc8; --text2:#9a8c72; --text3:#5a4f3c;
  --win:#4fc87a; --loss:#d44;
  --r:7px; --rlg:13px;
  --ff:'Noto Sans KR',sans-serif; --ft:'Cinzel',serif;
}
/* Server accent colors (per account) */
.acc-T { --acc:#2a6fd4; --acc2:#5090f0; --acc-bg:rgba(42,111,212,.12); }
.acc-H { --acc:#c8963e; --acc2:#e8b85e; --acc-bg:rgba(200,150,62,.12); }

* { box-sizing:border-box; margin:0; padding:0; }
html { height:100%; }
body { font-family:var(--ff); background:var(--bg); color:var(--text1); font-size:14px; min-height:100vh; }
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(ellipse 60% 40% at 15% 0%, rgba(200,168,75,.06) 0%, transparent 70%),
    radial-gradient(ellipse 50% 35% at 85% 100%, rgba(42,111,212,.05) 0%, transparent 70%);
}
input,select,button,textarea { font-family:var(--ff); color:var(--text1); }
input { background:var(--bg3); border:1px solid var(--border); border-radius:var(--r); padding:5px 8px; font-size:13px; outline:none; }
input:focus { border-color:var(--gold); }
select { background:var(--bg3); border:1px solid var(--border); border-radius:var(--r); padding:5px 8px; font-size:13px; outline:none; }
select:focus { border-color:var(--gold); }
button { cursor:pointer; }
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

.app { max-width:1120px; margin:0 auto; padding:1rem; position:relative; z-index:1; }

/* ════════════════ HEADER ════════════════ */
.hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.2rem; padding-bottom:.8rem; border-bottom:1px solid var(--border); flex-wrap:wrap; gap:8px; }
.logo { font-family:var(--ft); font-size:18px; font-weight:700; color:var(--gold); letter-spacing:.06em; text-shadow:0 0 18px rgba(200,168,75,.3); }
.logo small { font-family:var(--ff); font-size:12px; color:var(--text2); font-weight:400; margin-left:8px; letter-spacing:0; }
.hdr-btns { display:flex; gap:6px; flex-wrap:wrap; }

/* ════════════════ BUTTONS ════════════════ */
.btn { padding:6px 13px; border:1px solid var(--border); border-radius:var(--r); background:none; font-size:12px; color:var(--text1); transition:all .15s; }
.btn:hover { background:var(--bg3); border-color:var(--border2); }
.btn.gold { border-color:var(--gold); color:var(--gold); }
.btn.gold:hover { background:rgba(200,168,75,.1); }
.btn.red { border-color:var(--red); color:var(--red); }
.btn.red:hover { background:rgba(204,68,68,.1); }
.btn.sm { padding:3px 9px; font-size:11px; }
.btn.xs { padding:2px 7px; font-size:10px; }
.icon-btn { width:26px; height:26px; border:1px solid var(--border); border-radius:var(--r); background:none; display:flex; align-items:center; justify-content:center; font-size:13px; }
.icon-btn:hover { background:var(--bg3); border-color:var(--border2); }

/* ════════════════ ACCOUNT/SERVER TABS ════════════════ */
.tab-row { display:flex; gap:5px; margin-bottom:.9rem; flex-wrap:wrap; align-items:center; }
.tab-sep { width:1px; height:26px; background:var(--border); margin:0 3px; }
.stab { padding:6px 14px; border:1px solid var(--border); border-radius:var(--r); background:none; font-size:12px; font-family:var(--ft); color:var(--text2); letter-spacing:.04em; transition:all .2s; display:flex; align-items:center; gap:5px; }
.stab:hover { color:var(--text1); border-color:var(--border2); }
.stab.active { border-color:var(--acc); color:var(--acc); background:var(--acc-bg); box-shadow:0 0 10px rgba(0,0,0,.3); }
.stab .dot { width:7px; height:7px; border-radius:50%; background:var(--text3); flex-shrink:0; }
.stab .dot.has-deck { background:var(--win); box-shadow:0 0 5px var(--win); }
.acc-label { font-family:var(--ft); font-size:11px; color:var(--text3); letter-spacing:.08em; padding:0 4px; }

/* ════════════════ LAYOUT ════════════════ */
.layout { display:grid; grid-template-columns:1fr 300px; gap:12px; align-items:start; }
@media(max-width:700px) { .layout { grid-template-columns:1fr; } }

/* ════════════════ META BAR (gold/rating) ════════════════ */
.meta-bar { display:flex; gap:7px; margin-bottom:10px; flex-wrap:wrap; align-items:center; }
.meta-input-wrap { display:flex; align-items:center; gap:5px; background:var(--bg2); border:1px solid var(--border); border-radius:var(--r); padding:4px 10px; font-size:12px; }
.meta-input-wrap label { color:var(--text2); white-space:nowrap; }
.meta-input-wrap input { background:none; border:none; padding:0; width:65px; font-size:13px; color:var(--gold); }
.meta-input-wrap input:focus { border:none; outline:none; }
.reset-timer { font-size:11px; color:var(--text3); background:var(--bg2); border:1px solid var(--border); border-radius:var(--r); padding:4px 10px; margin-left:auto; }
.reset-timer span { color:var(--text2); }

/* ════════════════ DECK CARD ════════════════ */
.deck-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--rlg); overflow:hidden; position:relative; margin-bottom:10px; }
.deck-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--gold),transparent); }
.deck-hdr { padding:11px 14px 9px; display:flex; align-items:center; gap:8px; border-bottom:1px solid var(--border); flex-wrap:wrap; gap:6px; }
.class-sel { flex:1; min-width:100px; background:var(--bg3); border:1px solid var(--border); border-radius:var(--r); padding:5px 9px; font-size:13px; }
.deck-badge { padding:3px 9px; border-radius:20px; font-size:10px; font-weight:700; letter-spacing:.05em; white-space:nowrap; }
.deck-badge.active { background:rgba(79,200,122,.15); color:var(--green); border:1px solid rgba(79,200,122,.3); }
.deck-badge.done-win { background:rgba(200,168,75,.15); color:var(--gold); border:1px solid rgba(200,168,75,.3); }
.deck-badge.done-loss { background:rgba(204,68,68,.12); color:var(--red); border:1px solid rgba(204,68,68,.3); }
.deck-hdr-btns { display:flex; gap:5px; }

/* Score */
.score-wrap { padding:14px 16px; display:flex; align-items:center; justify-content:center; gap:20px; }
.score-blk { display:flex; flex-direction:column; align-items:center; gap:6px; }
.score-blk-label { font-size:10px; color:var(--text2); text-transform:uppercase; letter-spacing:.09em; font-weight:500; }
.pips { display:flex; gap:3px; flex-wrap:wrap; justify-content:center; max-width:150px; margin-bottom:3px; }
.pip { width:10px; height:10px; border-radius:2px; border:1px solid var(--border); background:var(--bg3); transition:all .2s; flex-shrink:0; }
.pip.wpip { background:var(--win); border-color:var(--win); box-shadow:0 0 5px rgba(79,200,122,.5); }
.pip.lpip { background:var(--loss); border-color:var(--loss); box-shadow:0 0 5px rgba(204,68,68,.5); }
.score-ctrl { display:flex; align-items:center; gap:8px; }
.sc-btn { width:30px; height:30px; border:1px solid var(--border); border-radius:50%; background:var(--bg3); font-size:17px; display:flex; align-items:center; justify-content:center; transition:all .15s; user-select:none; line-height:1; }
.sc-btn:hover:not(:disabled) { background:var(--bg4); border-color:var(--border2); }
.sc-btn.wb:hover:not(:disabled) { border-color:var(--win); color:var(--win); }
.sc-btn.lb:hover:not(:disabled) { border-color:var(--loss); color:var(--loss); }
.sc-btn:disabled { opacity:.25; cursor:default; }
.sc-val { font-family:var(--ft); font-size:32px; font-weight:700; min-width:40px; text-align:center; line-height:1; user-select:none; }
.sc-val.wv { color:var(--win); text-shadow:0 0 16px rgba(79,200,122,.4); }
.sc-val.lv { color:var(--loss); text-shadow:0 0 16px rgba(204,68,68,.4); }
.score-sep { font-family:var(--ft); font-size:26px; color:var(--text3); margin-top:18px; }

/* Deck notes */
.deck-note-wrap { padding:0 14px 10px; }
.deck-note { width:100%; background:var(--bg3); border:1px solid var(--border); border-radius:var(--r); padding:6px 9px; font-size:12px; resize:none; color:var(--text2); height:42px; }
.deck-note::placeholder { color:var(--text3); }
.deck-note:focus { border-color:var(--gold); color:var(--text1); outline:none; }

/* Reward */
.reward-bar { padding:0 14px 10px; display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
.reward-label { font-size:11px; color:var(--text3); }
.reward-input { width:65px; font-size:12px; text-align:center; }
.reward-type { font-size:12px; color:var(--text2); }

/* Opponent section */
.opp-section { border-top:1px solid var(--border); }
.opp-header { padding:8px 14px; display:flex; align-items:center; justify-content:space-between; gap:8px; }
.opp-title { font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:.07em; }
.opp-fold-btn { font-size:10px; color:var(--text3); background:none; border:none; padding:2px 6px; }
.opp-fold-btn:hover { color:var(--text2); }
.opp-body { }
.opp-row { display:grid; grid-template-columns:22px 100px 34px 34px 1fr 50px 18px; gap:4px; align-items:center; padding:5px 10px; border-top:1px solid var(--border); font-size:12px; }
.opp-row:hover { background:var(--bg3); }
.opp-num { font-size:10px; color:var(--text3); text-align:center; }
.opp-cls { font-size:12px; background:var(--bg3); border:1px solid var(--border); border-radius:4px; padding:3px 5px; width:100%; }
.opp-cls:focus { border-color:var(--gold); outline:none; }
.result-badge { width:30px; text-align:center; font-size:10px; font-weight:700; padding:2px 5px; border-radius:3px; }
.result-badge.W { background:rgba(79,200,122,.2); color:var(--win); }
.result-badge.L { background:rgba(204,68,68,.15); color:var(--loss); }
.coin-badge { width:30px; text-align:center; font-size:13px; cursor:pointer; }
.coin-badge.first { color:#4a9eff; }
.coin-badge.second { color:#c8a84b; }
.opp-note-inp { font-size:11px; background:var(--bg3); border:none; border-radius:4px; padding:3px 6px; width:100%; color:var(--text2); }
.opp-note-inp::placeholder { color:var(--text3); }
.opp-note-inp:focus { outline:1px solid var(--gold); color:var(--text1); }
.opp-date { font-size:9px; color:var(--text3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.opp-del { background:none; border:none; color:var(--text3); font-size:11px; padding:2px; }
.opp-del:hover { color:var(--red); }
/* opp detail expand */
.opp-detail { display:none; padding:4px 10px 6px; background:var(--bg1); border-top:1px solid var(--border); }
.opp-detail.open { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.opp-detail input { font-size:11px; }
.opp-detail label { font-size:10px; color:var(--text3); display:block; margin-bottom:2px; }

/* Complete overlay */
.complete-overlay { position:absolute; inset:0; background:rgba(16,14,10,.93); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; border-radius:var(--rlg); backdrop-filter:blur(3px); z-index:10; }
.co-icon { font-size:46px; animation:float 2.8s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
.co-score { font-family:var(--ft); font-size:30px; font-weight:700; }
.co-score.g { color:var(--gold); text-shadow:0 0 25px rgba(200,168,75,.5); }
.co-score.r { color:var(--red); }
.co-msg { font-size:12px; color:var(--text2); }

/* No deck */
.no-deck { background:var(--bg2); border:1px dashed var(--border); border-radius:var(--rlg); padding:36px 16px; text-align:center; color:var(--text3); margin-bottom:10px; }
.no-deck p { margin-bottom:10px; font-size:13px; }

/* ════════════════ QUEST PANEL (HS card-style) ════════════════ */
.quest-panel { display:flex; flex-direction:column; gap:10px; }
.qcard { background:var(--bg2); border:1px solid var(--border); border-radius:var(--rlg); overflow:hidden; }
.qcard-hdr { padding:9px 13px; background:var(--bg3); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; }
.qcard-title { font-family:var(--ft); font-size:11px; letter-spacing:.08em; color:var(--gold); flex:1; }
.qcard-add { font-size:18px; color:var(--text3); background:none; border:none; line-height:1; }
.qcard-add:hover { color:var(--gold); }
.qcard-body { padding:8px 10px; display:flex; flex-direction:column; gap:5px; }
/* Quest item */
.qi { display:flex; align-items:center; gap:7px; padding:6px 8px; border-radius:6px; background:var(--bg3); border:1px solid var(--border); position:relative; }
.qi.done { opacity:.5; }
.qi-cb { width:15px; height:15px; border:1.5px solid var(--border2); border-radius:3px; flex-shrink:0; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; }
.qi-cb.ck { background:var(--gold); border-color:var(--gold); }
.qi-cb.ck::after { content:'✓'; font-size:9px; color:#100e0a; font-weight:700; }
.qi-text { flex:1; font-size:12px; color:var(--text1); line-height:1.3; cursor:pointer; }
.qi-text.no-target { cursor:default; }
/* Progress widget */
.qi-prog { display:flex; align-items:center; gap:3px; flex-shrink:0; }
.prog-val { font-family:var(--ft); font-size:13px; color:var(--gold); min-width:28px; text-align:right; cursor:pointer; user-select:none; }
.prog-val:hover { color:var(--gold2); }
.prog-sep { font-size:11px; color:var(--text3); }
.prog-target { font-size:11px; color:var(--text2); }
/* inline editing */
.prog-input { width:52px; font-family:var(--ft); font-size:13px; text-align:right; color:var(--gold); background:var(--bg1); border:1px solid var(--gold); border-radius:4px; padding:1px 4px; }
.qi-actions { display:flex; gap:2px; }
.qi-del { background:none; border:none; color:transparent; font-size:10px; padding:2px 3px; }
.qi:hover .qi-del { color:var(--text3); }
.qi-del:hover { color:var(--red) !important; }
/* Quest no-target (checkbox only) */
.qi .qi-text-editable { cursor:text; }

/* ════════════════ STATS/HISTORY SECTION ════════════════ */
.stats-bar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px; }
.stat-chip { background:var(--bg2); border:1px solid var(--border); border-radius:var(--r); padding:6px 12px; font-size:12px; }
.stat-chip .val { font-family:var(--ft); font-size:15px; color:var(--gold); }
.stat-chip .lbl { color:var(--text2); font-size:11px; margin-left:4px; }

/* ════════════════ HISTORY/RECORDS PAGE ════════════════ */
.page { display:none; }
.page.active { display:block; }
.hist-controls { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:12px; }
.hist-controls input[type=date] { width:130px; font-size:12px; }
.filter-chip { padding:4px 10px; border:1px solid var(--border); border-radius:20px; background:none; font-size:11px; color:var(--text2); }
.filter-chip.active { border-color:var(--acc,var(--gold)); color:var(--acc,var(--gold)); background:var(--acc-bg,rgba(200,168,75,.1)); }
.hist-table { width:100%; border-collapse:collapse; background:var(--bg2); border:1px solid var(--border); border-radius:var(--rlg); overflow:hidden; }
.hist-table th { background:var(--bg3); font-size:11px; color:var(--text2); font-weight:500; text-align:left; padding:7px 10px; border-bottom:1px solid var(--border); }
.hist-table td { padding:7px 10px; border-bottom:1px solid var(--border); font-size:12px; vertical-align:top; }
.hist-table tr:last-child td { border-bottom:none; }
.hist-table tr:hover td { background:var(--bg3); }
.hs { font-family:var(--ft); font-size:13px; }
.hs.g { color:var(--gold); }
.hs.gr { color:var(--green); }
.hs.r { color:var(--red); }
.match-mini { display:flex; gap:2px; flex-wrap:wrap; max-width:120px; }
.mm { width:12px; height:12px; border-radius:2px; font-size:8px; display:flex; align-items:center; justify-content:center; }
.mm.W { background:rgba(79,200,122,.3); color:var(--win); }
.mm.L { background:rgba(204,68,68,.2); color:var(--loss); }
.mm.f { color:#4a9eff; font-size:9px; }
.mm.s { color:var(--gold); font-size:9px; }

/* Stats summary */
.stats-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:8px; margin-bottom:14px; }
.scard { background:var(--bg2); border:1px solid var(--border); border-radius:var(--r); padding:10px 13px; }
.scard .val { font-family:var(--ft); font-size:18px; color:var(--gold); }
.scard .lbl { font-size:11px; color:var(--text2); margin-top:2px; }

/* ════════════════ POPUP ════════════════ */
.popup-bg { position:fixed; inset:0; background:rgba(0,0,0,.75); display:flex; align-items:center; justify-content:center; z-index:900; backdrop-filter:blur(4px); }
.popup { background:var(--bg2); border:1px solid var(--border2); border-radius:var(--rlg); padding:20px 22px; width:420px; max-width:96vw; max-height:92vh; overflow-y:auto; }
.popup h3 { font-family:var(--ft); font-size:14px; color:var(--gold); margin-bottom:13px; letter-spacing:.05em; }
.pf { margin-bottom:9px; }
.pf label { font-size:11px; color:var(--text2); display:block; margin-bottom:3px; }
.pf input,.pf select,.pf textarea { width:100%; }
.pf textarea { height:55px; resize:vertical; padding:6px 9px; font-size:12px; background:var(--bg3); border:1px solid var(--border); border-radius:var(--r); color:var(--text1); }
.pf textarea::placeholder { color:var(--text3); }
.pf textarea:focus { border-color:var(--gold); outline:none; }
.pbtn-row { display:flex; gap:7px; justify-content:flex-end; margin-top:13px; }
.pgrid2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; }

/* ════════════════ MOBILE ════════════════ */
@media(max-width:500px) {
  .score-wrap { gap:12px; }
  .sc-val { font-size:26px; }
  .co-score { font-size:22px; }
  .opp-row { grid-template-columns:18px 80px 28px 28px 1fr 44px 16px; gap:3px; font-size:11px; }
  .stats-grid { grid-template-columns:1fr 1fr; }
}
</style>
</head>
<body>
<div class="app">

<!-- HEADER -->
<div class="hdr">
  <div class="logo">ARENA <small>하스스톤 트래커</small></div>
  <div class="hdr-btns">
    <button class="btn sm" onclick="showPage('main')">🃏 덱/퀘스트</button>
    <button class="btn sm" onclick="showPage('records')">📜 전체기록</button>
    <button class="btn sm gold" onclick="addNewDeck()">+ 새 덱</button>
  </div>
</div>

<!-- PAGES -->
<div id="pageMain" class="page active">

  <!-- Account + Server Tabs -->
  <div class="tab-row" id="tabRow"></div>

  <!-- Meta bar -->
  <div class="meta-bar" id="metaBar"></div>

  <div class="layout">
    <!-- LEFT -->
    <div>
      <div id="deckArea"></div>
    </div>
    <!-- RIGHT: Quests -->
    <div class="quest-panel" id="questPanel"></div>
  </div>

</div><!-- /pageMain -->

<div id="pageRecords" class="page">
  <div class="hist-controls" id="histControls"></div>
  <div class="stats-grid" id="statsGrid"></div>
  <div id="histTableWrap"></div>
</div>

</div><!-- /app -->

<!-- ════ POPUP: Deck Reward ════ -->
<div class="popup-bg" id="rewardPopup" style="display:none" onclick="if(event.target===this)closePopup('rewardPopup')">
  <div class="popup">
    <h3>🏆 덱 완료 보상</h3>
    <div class="pgrid2">
      <div class="pf"><label>골드</label><input type="number" id="rw_gold" placeholder="0" min="0"></div>
      <div class="pf"><label>팩</label><input type="number" id="rw_pack" placeholder="0" min="0"></div>
      <div class="pf"><label>입장권</label><input type="number" id="rw_ticket" placeholder="0" min="0"></div>
      <div class="pf"><label>기타 (카드, 스킨 등)</label><input type="text" id="rw_etc" placeholder="예: 황금전설카드"></div>
    </div>
    <div class="pf"><label>메모</label><textarea id="rw_note" placeholder="메모..."></textarea></div>
    <div class="pbtn-row">
      <button class="btn" onclick="closePopup('rewardPopup')">나중에</button>
      <button class="btn gold" onclick="saveReward()">저장 후 완료</button>
    </div>
  </div>
</div>

<!-- ════ POPUP: Quest Edit ════ -->
<div class="popup-bg" id="questEditPopup" style="display:none" onclick="if(event.target===this)closePopup('questEditPopup')">
  <div class="popup">
    <h3>퀘스트 편집</h3>
    <div class="pf"><label>퀘스트 이름</label><input type="text" id="qe_text" onkeydown="if(event.key==='Enter')saveQuestEdit()"></div>
    <div class="pf"><label>목표 수치 (0이면 체크박스만)</label><input type="number" id="qe_target" min="0" value="0"></div>
    <div class="pbtn-row">
      <button class="btn red sm" id="qe_del" onclick="deleteQuestItem()">삭제</button>
      <button class="btn sm" onclick="closePopup('questEditPopup')">취소</button>
      <button class="btn gold sm" onclick="saveQuestEdit()">저장</button>
    </div>
  </div>
</div>

<!-- ════ POPUP: Opp Detail ════ -->
<div class="popup-bg" id="oppDetailPopup" style="display:none" onclick="if(event.target===this)closePopup('oppDetailPopup')">
  <div class="popup">
    <h3>매치 상세</h3>
    <div class="pgrid2">
      <div class="pf"><label>상대 배틀태그</label><input type="text" id="od_btag" placeholder="닉네임#1234"></div>
      <div class="pf"><label>결과</label>
        <select id="od_result">
          <option value="W">승 (Win)</option>
          <option value="L">패 (Loss)</option>
        </select>
      </div>
      <div class="pf"><label>선/후공</label>
        <select id="od_coin">
          <option value="first">선공 (동전없음)</option>
          <option value="second">후공 (동전있음)</option>
        </select>
      </div>
      <div class="pf"><label>상대 클래스</label><select id="od_cls"></select></div>
      <div class="pf"><label>내 전설 카드</label><input type="text" id="od_myleg" placeholder="예: 오닉시아"></div>
      <div class="pf"><label>상대 전설 카드</label><input type="text" id="od_oppleg" placeholder="예: 렉사르"></div>
    </div>
    <div class="pf"><label>메모</label><textarea id="od_note" placeholder="메모..."></textarea></div>
    <div class="pbtn-row">
      <button class="btn red sm" id="od_del" onclick="deleteOppFromPopup()">삭제</button>
      <button class="btn sm" onclick="closePopup('oppDetailPopup')">취소</button>
      <button class="btn gold sm" onclick="saveOppDetail()">저장</button>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════
   CONSTANTS
══════════════════════════════════════════ */
const ACCOUNTS = ['T','H'];
const SERVERS  = ['ASIA','EU','NA'];
const RESET_KST = { ASIA:1, EU:7, NA:16 }; // KST hour
const MAX_W = 12, MAX_L = 3;
const HS_CLASSES = ['전사','성기사','사냥꾼','도적','사제','주술사','마법사','흑마법사','드루이드','악마사냥꾼','죽음의기사'];
const ACC_COLOR = { T:'--t-blue', H:'--t-amber' };
const CLASS_OPTS = HS_CLASSES.map(c=>`<option value="${c}">${c}</option>`).join('');

/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
let curAcc  = 'T';
let curSrv  = 'ASIA';
let curPage = 'main';

// quest edit context
let qeCtx = null; // {acc,srv,type,idx}
// opp detail context
let odCtx = null; // {acc,srv,oppIdx}
// reward context
let rwCtx = null; // {acc,srv}

/* ══════════════════════════════════════════
   STORAGE HELPERS
══════════════════════════════════════════ */
const K = (acc,srv,key) => `hs2_${acc}_${srv}_${key}`;
const GK = key => `hs2_g_${key}`;
function gd(key,def){ try{ const v=localStorage.getItem(key); return v!==null?JSON.parse(v):def; }catch(e){return def;} }
function sd(key,val){ localStorage.setItem(key,JSON.stringify(val)); }

// Per-slot data
function getDeck(a,s){ return gd(K(a,s,'deck'),null); }
function saveDeck(a,s,d){ sd(K(a,s,'deck'),d); }
function getMeta(a,s){ return gd(K(a,s,'meta'),{gold:0,rating:0,eventXP:0,eventXPMax:0}); }
function saveMeta(a,s,m){ sd(K(a,s,'meta'),m); }
function getQuests(a,s){ return gd(K(a,s,'quests'),defaultQuests()); }
function saveQuests(a,s,q){ sd(K(a,s,'quests'),q); }

// Global history
function getHistory(){ return gd(GK('history'),[]); }
function saveHistory(h){ sd(GK('history'),h); }

/* ══════════════════════════════════════════
   DEFAULT DATA
══════════════════════════════════════════ */
function defaultQuests(){
  return {
    daily:[
      {id:'d1',text:'야수 12장 내기',target:12,prog:0,done:false},
      {id:'d2',text:'도적/주술사/흑마 3판 완료',target:3,prog:0,done:false},
      {id:'d3',text:'(비어있음)',target:0,prog:0,done:false},
    ],
    weekly:[
      {id:'w1',text:'대격변 카드 내기 75장',target:75,prog:0,done:false},
      {id:'w2',text:'(비어있음)',target:0,prog:0,done:false},
      {id:'w3',text:'(비어있음)',target:0,prog:0,done:false},
    ],
    event:[
      {id:'e1',text:'기본 모드 주문 400회',target:400,prog:0,done:false},
    ]
  };
}

/* ══════════════════════════════════════════
   DECK OPS
══════════════════════════════════════════ */
function newDeck(a,s,cls){
  return {
    id:'dk_'+Date.now(),
    acc:a, srv:s, cls:cls||'전사',
    wins:0, losses:0,
    opponents:[], // reversed display → store oldest first, display reversed
    note:'',
    createdAt:new Date().toISOString(),
    reward:null
  };
}

function addNewDeck(){
  const a=curAcc,s=curSrv;
  const existing=getDeck(a,s);
  if(existing){
    if(!confirm(`${a}-${s}에 진행 중인 덱이 있습니다. 새 덱 시작 시 현재 덱은 기록에 저장됩니다.`)) return;
    finalizeDeck(a,s,'abandon');
  }
  const cls=HS_CLASSES[0];
  saveDeck(a,s,newDeck(a,s,cls));
  render();
}

function finalizeDeck(a,s,reason,reward){
  const deck=getDeck(a,s);
  if(!deck)return;
  const hist=getHistory();
  hist.unshift({...deck, reason:reason||'complete', reward:reward||null, completedAt:new Date().toISOString()});
  saveHistory(hist);
  sd(K(a,s,'deck'),null);
}

function promptReward(a,s){
  rwCtx={a,s};
  ['rw_gold','rw_pack','rw_ticket'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('rw_etc').value='';
  document.getElementById('rw_note').value='';
  showPopup('rewardPopup');
}
function saveReward(){
  const {a,s}=rwCtx||{};
  if(!a)return;
  const reward={
    gold:parseInt(document.getElementById('rw_gold').value)||0,
    pack:parseInt(document.getElementById('rw_pack').value)||0,
    ticket:parseInt(document.getElementById('rw_ticket').value)||0,
    etc:document.getElementById('rw_etc').value.trim(),
    note:document.getElementById('rw_note').value.trim()
  };
  closePopup('rewardPopup');
  finalizeDeck(a,s,'complete',reward);
  rwCtx=null;
  render();
}

/* ══════════════════════════════════════════
   SCORE OPS
══════════════════════════════════════════ */
function changeW(a,s,delta){
  const deck=getDeck(a,s);if(!deck)return;
  deck.wins=Math.max(0,Math.min(MAX_W,deck.wins+delta));
  if(delta>0){
    deck.opponents.push(mkOpp('W'));
    if(deck.wins>=MAX_W){saveDeck(a,s,deck);setTimeout(()=>{promptReward(a,s);},400);render();return;}
  }
  saveDeck(a,s,deck);render();
}
function changeL(a,s,delta){
  const deck=getDeck(a,s);if(!deck)return;
  deck.losses=Math.max(0,Math.min(MAX_L,deck.losses+delta));
  if(delta>0){
    deck.opponents.push(mkOpp('L'));
    if(deck.losses>=MAX_L){saveDeck(a,s,deck);setTimeout(()=>{promptReward(a,s);},400);render();return;}
  }
  saveDeck(a,s,deck);render();
}
function mkOpp(result){
  return {id:'op_'+Date.now()+Math.random(), result, coin:'first', cls:'', note:'', btag:'', myLeg:'', oppLeg:'', matchAt:new Date().toISOString()};
}

/* ══════════════════════════════════════════
   OPPONENT OPS
══════════════════════════════════════════ */
function addOpp(a,s){
  const deck=getDeck(a,s);if(!deck)return;
  deck.opponents.push(mkOpp('W'));
  saveDeck(a,s,deck);render();
}
function updateOpp(a,s,idx,field,val){
  const deck=getDeck(a,s);if(!deck)return;
  deck.opponents[idx][field]=val;
  saveDeck(a,s,deck);
}
function toggleCoin(a,s,idx){
  const deck=getDeck(a,s);if(!deck)return;
  deck.opponents[idx].coin=deck.opponents[idx].coin==='first'?'second':'first';
  saveDeck(a,s,deck);render();
}
function openOppDetail(a,s,idx){
  const deck=getDeck(a,s);if(!deck)return;
  const op=deck.opponents[idx];
  odCtx={a,s,idx};
  document.getElementById('od_btag').value=op.btag||'';
  document.getElementById('od_result').value=op.result||'W';
  document.getElementById('od_coin').value=op.coin||'first';
  document.getElementById('od_cls').innerHTML='<option value="">클래스</option>'+CLASS_OPTS;
  document.getElementById('od_cls').value=op.cls||'';
  document.getElementById('od_myleg').value=op.myLeg||'';
  document.getElementById('od_oppleg').value=op.oppLeg||'';
  document.getElementById('od_note').value=op.note||'';
  showPopup('oppDetailPopup');
}
function saveOppDetail(){
  if(!odCtx)return;
  const {a,s,idx}=odCtx;
  const deck=getDeck(a,s);if(!deck)return;
  Object.assign(deck.opponents[idx],{
    btag:document.getElementById('od_btag').value.trim(),
    result:document.getElementById('od_result').value,
    coin:document.getElementById('od_coin').value,
    cls:document.getElementById('od_cls').value,
    myLeg:document.getElementById('od_myleg').value.trim(),
    oppLeg:document.getElementById('od_oppleg').value.trim(),
    note:document.getElementById('od_note').value.trim()
  });
  // sync wins/losses with result
  saveDeck(a,s,deck);
  closePopup('oppDetailPopup');
  render();
}
function deleteOppFromPopup(){
  if(!odCtx)return;
  const {a,s,idx}=odCtx;
  const deck=getDeck(a,s);if(!deck)return;
  deck.opponents.splice(idx,1);
  saveDeck(a,s,deck);
  closePopup('oppDetailPopup');
  render();
}

/* ══════════════════════════════════════════
   QUEST OPS
══════════════════════════════════════════ */
function toggleQuest(a,s,type,idx){
  const q=getQuests(a,s);
  const item=q[type][idx];
  if(item.target>0){
    item.prog=item.prog>=item.target?0:item.target;
    item.done=item.prog>=item.target;
  } else {
    item.done=!item.done;
  }
  saveQuests(a,s,q);
  renderQuests();
}
function addQuestItem(a,s,type){
  const q=getQuests(a,s);
  q[type].push({id:'q_'+Date.now(),text:'새 퀘스트',target:0,prog:0,done:false});
  saveQuests(a,s,q);
  renderQuests();
}
function openQuestEdit(a,s,type,idx){
  const q=getQuests(a,s);
  const item=q[type][idx];
  qeCtx={a,s,type,idx};
  document.getElementById('qe_text').value=item.text;
  document.getElementById('qe_target').value=item.target;
  showPopup('questEditPopup');
  setTimeout(()=>document.getElementById('qe_text').focus(),50);
}
function saveQuestEdit(){
  if(!qeCtx)return;
  const {a,s,type,idx}=qeCtx;
  const q=getQuests(a,s);
  q[type][idx].text=document.getElementById('qe_text').value.trim()||'퀘스트';
  q[type][idx].target=parseInt(document.getElementById('qe_target').value)||0;
  if(q[type][idx].target===0)q[type][idx].prog=0;
  saveQuests(a,s,q);
  closePopup('questEditPopup');
  renderQuests();
}
function deleteQuestItem(){
  if(!qeCtx)return;
  const {a,s,type,idx}=qeCtx;
  const q=getQuests(a,s);
  q[type].splice(idx,1);
  saveQuests(a,s,q);
  closePopup('questEditPopup');
  renderQuests();
}

/* ══════════════════════════════════════════
   PROGRESS WIDGET (wheel + click-to-edit)
══════════════════════════════════════════ */
let progEditCtx=null;

function progWheelHandler(e,a,s,type,idx){
  e.preventDefault();
  const delta=e.deltaY<0?1:-1;
  const q=getQuests(a,s);
  const item=q[type][idx];
  item.prog=Math.max(0,Math.min(item.target,item.prog+delta));
  item.done=item.prog>=item.target;
  saveQuests(a,s,q);
  renderQuests();
}

function startProgEdit(a,s,type,idx){
  progEditCtx={a,s,type,idx};
  renderQuests();
  setTimeout(()=>{
    const inp=document.getElementById('prog_inp_'+a+'_'+s+'_'+type+'_'+idx);
    if(inp){ inp.focus(); inp.select(); }
  },0);
}

function commitProgEdit(a,s,type,idx,el){
  const q=getQuests(a,s);
  const val=parseInt(el.value);
  if(!isNaN(val)){
    q[type][idx].prog=Math.max(0,Math.min(q[type][idx].target,val));
    q[type][idx].done=q[type][idx].prog>=q[type][idx].target;
    saveQuests(a,s,q);
  }
  progEditCtx=null;
  renderQuests();
}

/* ══════════════════════════════════════════
   RENDER: TABS
══════════════════════════════════════════ */
function renderTabs(){
  let h='';
  ACCOUNTS.forEach((a,ai)=>{
    if(ai>0) h+=`<div class="tab-sep"></div>`;
    h+=`<span class="acc-label" style="color:${a==='T'?'var(--t-blue)':'var(--t-amber)'}">${a}</span>`;
    SERVERS.forEach(s=>{
      const hasDeck=!!getDeck(a,s);
      const isActive=a===curAcc&&s===curSrv;
      const accClass=`acc-${a}`;
      h+=`<button class="stab ${accClass}${isActive?' active':''}" onclick="curAcc='${a}';curSrv='${s}';render()">
        <span class="dot${hasDeck?' has-deck':''}"></span>${s}
      </button>`;
    });
  });
  document.getElementById('tabRow').innerHTML=h;
}

/* ══════════════════════════════════════════
   RENDER: META BAR
══════════════════════════════════════════ */
function renderMeta(){
  const a=curAcc,s=curSrv;
  const m=getMeta(a,s);
  // Reset timer
  const now=new Date();
  const krH=(now.getUTCHours()+9)%24;
  const krM=now.getUTCMinutes();
  const rh=RESET_KST[s];
  let hl=rh-krH; let ml=60-krM;
  if(ml===60){ml=0;}else{hl-=1;}
  if(hl<0)hl+=24;
  const timerStr=`${hl}:${String(ml).padStart(2,'0')}`;

  document.getElementById('metaBar').innerHTML=`
    <div class="meta-input-wrap">
      <label>🪙 골드</label>
      <input type="number" value="${m.gold||0}" min="0" onchange="saveMf('${a}','${s}','gold',this.value)" style="width:70px">
    </div>
    <div class="meta-input-wrap">
      <label>🏆 평점</label>
      <input type="text" value="${m.rating||''}" placeholder="—" onchange="saveMf('${a}','${s}','rating',this.value)" style="width:60px">
    </div>
    <div class="meta-input-wrap">
      <label>✨ 이벤트XP</label>
      <input type="number" value="${m.eventXP||0}" min="0" onchange="saveMf('${a}','${s}','eventXP',this.value)" style="width:60px">
      <span style="color:var(--text3)"> / </span>
      <input type="number" value="${m.eventXPMax||0}" min="0" onchange="saveMf('${a}','${s}','eventXPMax',this.value)" style="width:60px">
    </div>
    <div class="reset-timer">다음 리셋 <span>${timerStr}</span></div>
  `;
}
function saveMf(a,s,field,val){
  const m=getMeta(a,s);
  m[field]=isNaN(+val)?val:+val;
  saveMeta(a,s,m);
}

/* ══════════════════════════════════════════
   RENDER: DECK
══════════════════════════════════════════ */
let foldedOpps=false;

function renderDeck(){
  const a=curAcc,s=curSrv;
  const deck=getDeck(a,s);
  const area=document.getElementById('deckArea');
  if(!deck){
    area.innerHTML=`<div class="no-deck"><p>${a}-${s} 서버에 진행 중인 아레나 덱이 없습니다</p>
      <button class="btn gold" onclick="addNewDeck()">+ 새 덱 시작</button></div>`;
    return;
  }
  const isComplete=deck.wins>=MAX_W||deck.losses>=MAX_L;
  const clsOpts=HS_CLASSES.map(c=>`<option value="${c}"${c===deck.cls?' selected':''}>${c}</option>`).join('');

  // Pips
  const wPips=Array.from({length:MAX_W},(_,i)=>`<div class="pip${i<deck.wins?' wpip':''}"></div>`).join('');
  const lPips=Array.from({length:MAX_L},(_,i)=>`<div class="pip${i<deck.losses?' lpip':''}"></div>`).join('');

  // Opponents — displayed newest-first
  const opps=[...deck.opponents].reverse();
  const showCount=foldedOpps?Math.min(3,opps.length):opps.length;
  const oppRowsHtml=opps.slice(0,showCount).map((op,ri)=>{
    const origIdx=deck.opponents.length-1-ri; // original index
    const coinDisp=op.coin==='first'?`<span style="color:#4a9eff;font-size:13px" title="선공">선</span>`:`<span style="color:#c8a84b;font-size:13px" title="후공">후</span>`;
    const mDate=op.matchAt?new Date(op.matchAt).toLocaleDateString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}):'';
    return `<div class="opp-row">
      <span class="opp-num">${deck.opponents.length-ri}</span>
      <select class="opp-cls" onchange="updateOpp('${a}','${s}',${origIdx},'cls',this.value)">
        <option value="">클래스</option>${HS_CLASSES.map(c=>`<option value="${c}"${c===op.cls?' selected':''}>${c}</option>`).join('')}
      </select>
      <span class="result-badge ${op.result}">${op.result==='W'?'승':'패'}</span>
      <span class="coin-badge ${op.coin}" onclick="toggleCoin('${a}','${s}',${origIdx})" title="클릭으로 선/후 변경">${coinDisp}</span>
      <input class="opp-note-inp" type="text" placeholder="메모" value="${(op.note||'').replace(/"/g,'&quot;')}"
        oninput="updateOpp('${a}','${s}',${origIdx},'note',this.value)">
      <span class="opp-date">${mDate}</span>
      <button class="opp-del" onclick="openOppDetail('${a}','${s}',${origIdx})">⚙</button>
    </div>`;
  }).join('');

  const foldBtnTxt=foldedOpps?`펼치기 (전체 ${deck.opponents.length}전)`:`접기`;
  const completeOverlay=isComplete?`<div class="complete-overlay">
    <div class="co-icon">${deck.wins>=MAX_W?'🏆':'💀'}</div>
    <div class="co-score ${deck.wins>=MAX_W?'g':'r'}">${deck.wins}승 ${deck.losses}패</div>
    <div class="co-msg">${deck.wins>=MAX_W?'12승 달성!':'3패로 종료'}</div>
    <button class="btn gold" onclick="promptReward('${a}','${s}')">보상 입력 후 완료</button>
    <button class="btn sm" onclick="finalizeDeck('${a}','${s}','complete');render()">보상 없이 완료</button>
  </div>`:'';

  const dateStr=new Date(deck.createdAt).toLocaleDateString('ko-KR');
  area.innerHTML=`<div class="deck-card" id="deckCard">
    ${completeOverlay}
    <div class="deck-hdr">
      <select class="class-sel" onchange="updateDeckField('${a}','${s}','cls',this.value)">${clsOpts}</select>
      <span class="deck-badge ${isComplete?(deck.wins>=MAX_W?'done-win':'done-loss'):'active'}">${isComplete?(deck.wins>=MAX_W?'12승 완료':'3패 종료'):'진행중'}</span>
      <span style="font-size:11px;color:var(--text3);margin-left:auto">${dateStr}</span>
    </div>
    <div class="score-wrap">
      <div class="score-blk">
        <span class="score-blk-label">승리</span>
        <div class="pips">${wPips}</div>
        <div class="score-ctrl">
          <button class="sc-btn lb" onclick="changeW('${a}','${s}',-1)" ${deck.wins<=0?'disabled':''}>−</button>
          <div class="sc-val wv" id="scW_${a}_${s}">${deck.wins}</div>
          <button class="sc-btn wb" onclick="changeW('${a}','${s}',1)" ${deck.wins>=MAX_W||isComplete?'disabled':''}>+</button>
        </div>
      </div>
      <div class="score-sep">/</div>
      <div class="score-blk">
        <span class="score-blk-label">패배</span>
        <div class="pips">${lPips}</div>
        <div class="score-ctrl">
          <button class="sc-btn wb" onclick="changeL('${a}','${s}',-1)" ${deck.losses<=0?'disabled':''}>−</button>
          <div class="sc-val lv" id="scL_${a}_${s}">${deck.losses}</div>
          <button class="sc-btn lb" onclick="changeL('${a}','${s}',1)" ${deck.losses>=MAX_L||isComplete?'disabled':''}>+</button>
        </div>
      </div>
    </div>
    <div class="deck-note-wrap">
      <textarea class="deck-note" placeholder="덱 메모 (키카드, 전략 등)" onchange="updateDeckField('${a}','${s}','note',this.value)">${deck.note||''}</textarea>
    </div>
    <div class="opp-section">
      <div class="opp-header">
        <span class="opp-title">상대 기록 (${deck.opponents.length}전)</span>
        <div style="display:flex;gap:6px;align-items:center">
          <button class="btn sm" onclick="addOpp('${a}','${s}')">+ 추가</button>
          ${deck.opponents.length>3?`<button class="opp-fold-btn" onclick="foldedOpps=!foldedOpps;renderDeck()">${foldBtnTxt}</button>`:''}
        </div>
      </div>
      <div class="opp-body">${oppRowsHtml}</div>
    </div>
  </div>`;

  // Wheel on score vals
  setTimeout(()=>{
    const wv=document.getElementById(`scW_${a}_${s}`);
    const lv=document.getElementById(`scL_${a}_${s}`);
    if(wv) wv.addEventListener('wheel',e=>{e.preventDefault();changeW(a,s,e.deltaY<0?1:-1);},{passive:false});
    if(lv) lv.addEventListener('wheel',e=>{e.preventDefault();changeL(a,s,e.deltaY<0?1:-1);},{passive:false});
  },0);
}

function updateDeckField(a,s,field,val){
  const deck=getDeck(a,s);if(!deck)return;
  deck[field]=val;saveDeck(a,s,deck);
}

/* ══════════════════════════════════════════
   RENDER: QUESTS (HS card style)
══════════════════════════════════════════ */
function renderQuests(){
  const a=curAcc,s=curSrv;
  const q=getQuests(a,s);
  const panel=document.getElementById('questPanel');
  const types=[
    {key:'daily',label:'⚔ 일일 퀘스트',slots:3},
    {key:'weekly',label:'📅 주간 퀘스트',slots:3},
    {key:'event',label:'🏆 이벤트 퀘스트',slots:null}
  ];
  panel.innerHTML=types.map(t=>{
    const items=q[t.key]||[];
    // Pad with empty slots if needed
    const displayItems=[...items];
    if(t.slots) while(displayItems.length<t.slots) displayItems.push(null);

    const itemsHtml=displayItems.map((item,idx)=>{
      if(!item) return `<div class="qi" style="opacity:.25;justify-content:center">
        <span style="font-size:11px;color:var(--text3)">빈 슬롯 (새 퀘스트 대기)</span>
      </div>`;
      const isDone=item.target>0?item.prog>=item.target:item.done;
      const isEditing=progEditCtx&&progEditCtx.a===a&&progEditCtx.s===s&&progEditCtx.type===t.key&&progEditCtx.idx===idx;

      let progHtml='';
      if(item.target>0){
        if(isEditing){
          progHtml=`<div class="qi-prog">
            <input class="prog-input" id="prog_inp_${a}_${s}_${t.key}_${idx}"
              type="number" min="0" max="${item.target}" value="${item.prog}"
              onblur="commitProgEdit('${a}','${s}','${t.key}',${idx},this)"
              onkeydown="if(event.key==='Enter')commitProgEdit('${a}','${s}','${t.key}',${idx},this);if(event.key==='Escape'){progEditCtx=null;renderQuests();}"
            >
            <span class="prog-sep">/</span>
            <span class="prog-target">${item.target}</span>
          </div>`;
        } else {
          progHtml=`<div class="qi-prog" id="prog_disp_${a}_${s}_${t.key}_${idx}">
            <span class="prog-val" title="클릭으로 편집, 휠로 조정"
              onclick="startProgEdit('${a}','${s}','${t.key}',${idx})">${item.prog}</span>
            <span class="prog-sep">/</span>
            <span class="prog-target">${item.target}</span>
          </div>`;
        }
      }

      return `<div class="qi${isDone?' done':''}">
        <div class="qi-cb${isDone?' ck':''}" onclick="toggleQuest('${a}','${s}','${t.key}',${idx})"></div>
        <div class="qi-text" ondblclick="openQuestEdit('${a}','${s}','${t.key}',${idx})" title="더블클릭으로 편집">${item.text}</div>
        ${progHtml}
        <div class="qi-actions">
          <button class="qi-del" onclick="openQuestEdit('${a}','${s}','${t.key}',${idx})">✎</button>
        </div>
      </div>`;
    }).join('');

    // wheel on prog disp
    return `<div class="qcard">
      <div class="qcard-hdr">
        <span class="qcard-title">${t.label}</span>
        <button class="qcard-add" onclick="addQuestItem('${a}','${s}','${t.key}')" title="퀘스트 추가">+</button>
      </div>
      <div class="qcard-body" id="qbody_${t.key}">${itemsHtml}</div>
    </div>`;
  }).join('');

  // Attach wheel listeners to prog displays
  setTimeout(()=>{
    const types2=['daily','weekly','event'];
    types2.forEach(tk=>{
      const items=q[tk]||[];
      items.forEach((item,idx)=>{
        if(!item||!item.target)return;
        const el=document.getElementById(`prog_disp_${a}_${s}_${tk}_${idx}`);
        if(!el)return;
        el.addEventListener('wheel',e=>progWheelHandler(e,a,s,tk,idx),{passive:false});
      });
    });
  },0);
}

/* ══════════════════════════════════════════
   RENDER: RECORDS PAGE
══════════════════════════════════════════ */
let histFilter={acc:null,srv:null,dateFrom:'',dateTo:''};

function renderRecords(){
  const hist=getHistory();

  // Controls
  const accBtns=ACCOUNTS.map(a=>`<button class="filter-chip${histFilter.acc===a?' active':''}" onclick="histFilter.acc=histFilter.acc==='${a}'?null:'${a}';renderRecords()">${a}</button>`).join('');
  const srvBtns=SERVERS.map(s=>`<button class="filter-chip${histFilter.srv===s?' active':''}" onclick="histFilter.srv=histFilter.srv==='${s}'?null:'${s}';renderRecords()">${s}</button>`).join('');

  document.getElementById('histControls').innerHTML=`
    <div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap">
      <span style="font-size:11px;color:var(--text3)">계정:</span>${accBtns}
      <span style="font-size:11px;color:var(--text3);margin-left:6px">서버:</span>${srvBtns}
    </div>
    <div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-top:5px">
      <span style="font-size:11px;color:var(--text3)">기간:</span>
      <input type="date" value="${histFilter.dateFrom}" onchange="histFilter.dateFrom=this.value;renderRecords()" style="width:130px;font-size:12px">
      <span style="color:var(--text3)">~</span>
      <input type="date" value="${histFilter.dateTo}" onchange="histFilter.dateTo=this.value;renderRecords()" style="width:130px;font-size:12px">
      <button class="btn sm" onclick="histFilter={acc:null,srv:null,dateFrom:'',dateTo:''};renderRecords()">초기화</button>
    </div>
  `;

  // Filter
  let filtered=hist.filter(h=>{
    if(histFilter.acc&&h.acc!==histFilter.acc)return false;
    if(histFilter.srv&&h.srv!==histFilter.srv)return false;
    const cd=h.completedAt?h.completedAt.slice(0,10):'';
    if(histFilter.dateFrom&&cd<histFilter.dateFrom)return false;
    if(histFilter.dateTo&&cd>histFilter.dateTo)return false;
    return true;
  });

  // Stats
  const totalDecks=filtered.length;
  const totalGames=filtered.reduce((s,h)=>s+(h.wins+h.losses),0);
  const totalWins=filtered.reduce((s,h)=>s+h.wins,0);
  const avgW=totalDecks?+(totalWins/totalDecks).toFixed(2):0;
  const winPct=totalGames?Math.round(totalWins/totalGames*100):0;
  const deck12=filtered.filter(h=>h.wins>=12).length;
  const totalGold=filtered.reduce((s,h)=>s+(h.reward?.gold||0),0);

  document.getElementById('statsGrid').innerHTML=`
    <div class="scard"><div class="val">${totalDecks}</div><div class="lbl">총 덱 수</div></div>
    <div class="scard"><div class="val">${avgW}</div><div class="lbl">평균 승수</div></div>
    <div class="scard"><div class="val">${winPct}%</div><div class="lbl">게임 승률</div></div>
    <div class="scard"><div class="val">${deck12}</div><div class="lbl">12승 덱</div></div>
    <div class="scard"><div class="val">${totalGold}🪙</div><div class="lbl">총 골드 보상</div></div>
    <div class="scard"><div class="val">${totalGames}</div><div class="lbl">총 게임 수</div></div>
  `;

  // Table
  if(!filtered.length){
    document.getElementById('histTableWrap').innerHTML=`<div style="padding:30px;text-align:center;color:var(--text3)">기록이 없습니다</div>`;
    return;
  }

  const rows=filtered.map((h,i)=>{
    const sc=h.wins>=12?'g':h.wins>=7?'gr':'r';
    const cd=h.completedAt?new Date(h.completedAt).toLocaleDateString('ko-KR'):'';
    const opps=[...( h.opponents||[])].reverse(); // newest first
    const matchMinis=opps.slice(0,20).map(op=>{
      const coinTxt=op.coin==='first'?'<span class="mm f">선</span>':'<span class="mm s">후</span>';
      return `<div class="mm ${op.result}" title="${op.cls||'?'} ${op.result==='W'?'승':'패'}">${op.result}</div>${coinTxt}`;
    }).join('');
    const rew=h.reward;
    const rewStr=rew?[rew.gold?`🪙${rew.gold}`:'',rew.pack?`📦${rew.pack}`:'',rew.ticket?`🎟${rew.ticket}`:'',rew.etc?rew.etc:''].filter(Boolean).join(' '):'—';
    return `<tr>
      <td><span class="hs ${sc}">${h.wins}승${h.losses}패</span></td>
      <td style="font-size:12px;color:var(--text2)">${h.cls}</td>
      <td><span style="font-size:10px;color:${h.acc==='T'?'var(--t-blue)':'var(--t-amber)'}">${h.acc}</span> <span style="font-size:10px;color:var(--text3)">${h.srv}</span></td>
      <td><div class="match-mini">${matchMinis}</div></td>
      <td style="font-size:11px;color:var(--text2)">${rewStr}</td>
      <td style="font-size:10px;color:var(--text3)">${cd}</td>
      <td><button class="btn xs red" onclick="deleteHist(${i})">삭제</button></td>
    </tr>`;
  }).join('');

  document.getElementById('histTableWrap').innerHTML=`
    <table class="hist-table">
      <thead><tr>
        <th>결과</th><th>클래스</th><th>계정/서버</th><th>매치</th><th>보상</th><th>날짜</th><th></th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function deleteHist(visIdx){
  const hist=getHistory();
  // visIdx is index in filtered; for simplicity delete from full by matching id
  // We stored filtered, not full. Since we render from full, we need to match.
  // Simpler: re-filter to find the id, then remove from full
  let filtered=hist.filter(h=>{
    if(histFilter.acc&&h.acc!==histFilter.acc)return false;
    if(histFilter.srv&&h.srv!==histFilter.srv)return false;
    const cd=h.completedAt?h.completedAt.slice(0,10):'';
    if(histFilter.dateFrom&&cd<histFilter.dateFrom)return false;
    if(histFilter.dateTo&&cd>histFilter.dateTo)return false;
    return true;
  });
  const target=filtered[visIdx];
  if(!target||!confirm('이 기록을 삭제할까요?'))return;
  const newHist=hist.filter(h=>h!==target&&!(h.id&&h.id===target.id));
  saveHistory(newHist);
  renderRecords();
}

/* ══════════════════════════════════════════
   PAGE SWITCH
══════════════════════════════════════════ */
function showPage(name){
  curPage=name;
  document.getElementById('pageMain').classList.toggle('active',name==='main');
  document.getElementById('pageRecords').classList.toggle('active',name==='records');
  if(name==='records') renderRecords();
}

/* ══════════════════════════════════════════
   POPUPS
══════════════════════════════════════════ */
function showPopup(id){ document.getElementById(id).style.display='flex'; }
function closePopup(id){ document.getElementById(id).style.display='none'; }

/* ══════════════════════════════════════════
   KEYBOARD
══════════════════════════════════════════ */
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    ['rewardPopup','questEditPopup','oppDetailPopup'].forEach(id=>closePopup(id));
    if(progEditCtx){progEditCtx=null;renderQuests();}
  }
  if(curPage!=='main')return;
  const tag=document.activeElement?.tagName;
  if(tag==='INPUT'||tag==='SELECT'||tag==='TEXTAREA')return;
  const a=curAcc,s=curSrv;
  if(e.key==='ArrowUp'){e.preventDefault();changeW(a,s,1);}
  if(e.key==='ArrowDown'){e.preventDefault();changeW(a,s,-1);}
  if(e.key==='ArrowRight'){e.preventDefault();changeL(a,s,1);}
  if(e.key==='ArrowLeft'){e.preventDefault();changeL(a,s,-1);}
});

/* ══════════════════════════════════════════
   MAIN RENDER
══════════════════════════════════════════ */
function render(){
  renderTabs();
  renderMeta();
  renderDeck();
  renderQuests();
}

// Init
render();
// Update reset timer every minute
setInterval(()=>renderMeta(),60000);
</script>
