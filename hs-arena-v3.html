<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>ARENA QUEST</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#1a1712; --bg1:#221f19; --bg2:#2c2820; --bg3:#363028; --bg4:#403830;
  --border:#4a4035; --border2:#6a5a48;
  --gold:#c8a84b; --gold2:#e8c96b; --gold3:#f5dfa0;
  --blue:#4a8fd4; --red:#d45; --green:#4db870;
  --t-acc:#4a8fd4; --h-acc:#c8963e;
  --text1:#f0e8d4; --text2:#a89878; --text3:#6a5a48;
  --win:#4db870; --loss:#d45;
  --r:6px; --rlg:12px;
  --ff:'Noto Sans KR',sans-serif; --ft:'Cinzel',serif;
}
.acc-T{--acc:var(--t-acc);--acc-bg:rgba(74,143,212,.13);}
.acc-H{--acc:var(--h-acc);--acc-bg:rgba(200,150,62,.13);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--ff);background:var(--bg);color:var(--text1);font-size:14px;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 70% 50% at 10% 0%,rgba(200,168,75,.05) 0%,transparent 60%),
  radial-gradient(ellipse 60% 40% at 90% 100%,rgba(74,143,212,.04) 0%,transparent 60%);}
input,select,button,textarea{font-family:var(--ff);color:var(--text1);}
input,select{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:5px 8px;font-size:13px;outline:none;}
input:focus,select:focus{border-color:var(--gold);}
button{cursor:pointer;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.app{max-width:1200px;margin:0 auto;padding:1rem;position:relative;z-index:1;}

/* ── HEADER ── */
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;padding-bottom:.8rem;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px;}
.logo{font-family:var(--ft);font-size:20px;font-weight:700;color:var(--gold);letter-spacing:.1em;text-shadow:0 0 20px rgba(200,168,75,.25);}
.hdr-btns{display:flex;gap:5px;flex-wrap:wrap;}

/* ── BUTTONS ── */
.btn{padding:5px 12px;border:1px solid var(--border);border-radius:var(--r);background:none;font-size:12px;color:var(--text1);transition:all .15s;}
.btn:hover{background:var(--bg3);border-color:var(--border2);}
.btn.gold{border-color:var(--gold);color:var(--gold);}
.btn.gold:hover{background:rgba(200,168,75,.12);}
.btn.red{border-color:var(--red);color:var(--red);}
.btn.red:hover{background:rgba(212,68,68,.1);}
.btn.active{background:var(--bg3);border-color:var(--gold);color:var(--gold);}
.btn.sm{padding:3px 8px;font-size:11px;}
.btn.xs{padding:2px 6px;font-size:10px;}

/* ── PAGES ── */
.page{display:none;}.page.active{display:block;}

/* ── ACCOUNT+SERVER TABS ── */
.tab-row{display:flex;gap:5px;margin-bottom:.8rem;flex-wrap:wrap;align-items:center;}
.tab-sep{width:1px;height:22px;background:var(--border);margin:0 4px;}
.acc-label{font-family:var(--ft);font-size:10px;letter-spacing:.1em;padding:0 3px;}
.stab{padding:5px 12px;border:1px solid var(--border);border-radius:var(--r);background:none;font-size:12px;font-family:var(--ft);color:var(--text2);letter-spacing:.04em;transition:all .18s;display:flex;align-items:center;gap:5px;}
.stab:hover{color:var(--text1);border-color:var(--border2);}
.stab.active{border-color:var(--acc);color:var(--acc);background:var(--acc-bg);}
.stab .dot{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0;}
.stab .dot.has-deck{background:var(--win);box-shadow:0 0 5px var(--win);}

/* ── RATING ROW ── */
.rating-row{display:flex;gap:8px;margin-bottom:.8rem;flex-wrap:wrap;align-items:center;}
.rating-cell{display:flex;align-items:center;gap:5px;padding:4px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);font-size:11px;}
.rating-cell .acc-dot{width:8px;height:8px;border-radius:50%;}
.rating-cell label{color:var(--text3);}
.rating-cell input{background:none;border:none;padding:0;width:55px;font-size:12px;font-family:var(--ft);color:var(--gold);}
.rating-cell input:focus{outline:none;}

/* ── MAIN LAYOUT ── */
/* Desktop: quests top, deck below */
.main-content{display:flex;flex-direction:column;gap:12px;}

/* ── QUEST SECTION ── */
.quest-section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rlg);overflow:hidden;}
.quest-section-hdr{padding:10px 14px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.qs-title{font-family:var(--ft);font-size:12px;letter-spacing:.08em;color:var(--gold);}

/* Quest grid - matches in-game layout */
.quest-grid{display:grid;grid-template-columns:repeat(3,1fr) 1fr;gap:10px;padding:12px;}
.quest-col{display:flex;flex-direction:column;gap:8px;}
.quest-col-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-weight:500;text-align:center;padding:4px 0;border-bottom:1px solid var(--border);}
.quest-slots{display:flex;flex-direction:column;gap:6px;padding-top:4px;}
/* Quest item card */
.qi{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 10px;position:relative;cursor:default;}
.qi.done{opacity:.45;}
.qi.drag-over{border-color:var(--gold);}
.qi-top{display:flex;align-items:flex-start;gap:6px;margin-bottom:6px;}
.qi-cb{width:16px;height:16px;border:1.5px solid var(--border2);border-radius:4px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .2s;}
.qi-cb.ck{background:var(--gold);border-color:var(--gold);}
.qi-cb.ck::after{content:'✓';font-size:9px;color:#1a1712;font-weight:700;}
.qi-text{flex:1;font-size:12px;color:var(--text1);line-height:1.4;word-break:keep-all;}
.qi-actions{display:flex;gap:2px;flex-shrink:0;}
.qi-edit-btn,.qi-del-btn{background:none;border:none;font-size:11px;padding:1px 3px;color:var(--text3);}
.qi-edit-btn:hover{color:var(--gold);}
.qi-del-btn:hover{color:var(--red);}
/* Progress bar */
.qi-prog-row{display:flex;align-items:center;gap:5px;}
.prog-bar-wrap{flex:1;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;}
.prog-bar-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .3s;}
.prog-text{font-family:var(--ft);font-size:12px;color:var(--gold);cursor:pointer;min-width:36px;text-align:right;flex-shrink:0;}
.prog-text:hover{color:var(--gold2);}
.prog-sep{font-size:11px;color:var(--text3);}
.prog-target-txt{font-size:11px;color:var(--text2);flex-shrink:0;}
.prog-input{width:48px;font-family:var(--ft);font-size:12px;text-align:right;color:var(--gold);background:var(--bg2);border:1px solid var(--gold);border-radius:3px;padding:1px 3px;}
/* Empty slot */
.qi-empty{background:var(--bg3);border:1px dashed var(--border);border-radius:8px;padding:8px 10px;opacity:.35;min-height:52px;display:flex;align-items:center;justify-content:center;}
.qi-empty span{font-size:11px;color:var(--text3);}
/* Event XP */
.event-xp-row{display:flex;align-items:center;gap:6px;padding:6px 10px 8px;font-size:12px;}
.event-xp-row label{color:var(--text2);}
.event-xp-row input{width:55px;font-size:12px;text-align:center;}

/* ── DECK AREA ── */
.deck-area{display:flex;flex-direction:column;gap:8px;}
/* Active deck card */
.deck-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rlg);overflow:hidden;position:relative;}
.deck-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.deck-hdr{padding:10px 14px 8px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.class-sel{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:4px 8px;font-size:13px;min-width:80px;}
.deck-my-legend{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:4px 8px;font-size:12px;color:var(--text2);min-width:80px;}
.deck-my-legend::placeholder{color:var(--text3);}
.deck-my-legend:focus{border-color:var(--gold);color:var(--text1);}
.deck-badge{padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap;}
.deck-badge.active{background:rgba(77,184,112,.15);color:var(--green);border:1px solid rgba(77,184,112,.3);}
.deck-badge.done-win{background:rgba(200,168,75,.15);color:var(--gold);border:1px solid rgba(200,168,75,.3);}
.deck-badge.done-loss{background:rgba(212,68,68,.12);color:var(--red);border:1px solid rgba(212,68,68,.3);}
/* Score */
.score-wrap{padding:12px 16px;display:flex;align-items:center;justify-content:center;gap:20px;}
.score-blk{display:flex;flex-direction:column;align-items:center;gap:5px;}
.score-lbl{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.1em;}
.pips{display:flex;gap:3px;flex-wrap:wrap;justify-content:center;max-width:140px;margin-bottom:2px;}
.pip{width:10px;height:10px;border-radius:2px;border:1px solid var(--border);background:var(--bg3);}
.pip.wpip{background:var(--win);border-color:var(--win);box-shadow:0 0 4px rgba(77,184,112,.5);}
.pip.lpip{background:var(--loss);border-color:var(--loss);box-shadow:0 0 4px rgba(212,68,68,.5);}
.score-ctrl{display:flex;align-items:center;gap:8px;}
.sc-btn{width:28px;height:28px;border:1px solid var(--border);border-radius:50%;background:var(--bg3);font-size:16px;display:flex;align-items:center;justify-content:center;line-height:1;user-select:none;}
.sc-btn:hover:not(:disabled){background:var(--bg4);border-color:var(--border2);}
.sc-btn.wb:hover:not(:disabled){border-color:var(--win);color:var(--win);}
.sc-btn.lb:hover:not(:disabled){border-color:var(--loss);color:var(--loss);}
.sc-btn:disabled{opacity:.22;cursor:default;}
.sc-val{font-family:var(--ft);font-size:30px;font-weight:700;min-width:36px;text-align:center;user-select:none;}
.sc-val.wv{color:var(--win);}
.sc-val.lv{color:var(--loss);}
.score-sep{font-family:var(--ft);font-size:22px;color:var(--text3);margin-top:14px;}
/* Audience bonus */
.audience-row{padding:0 14px 8px;display:flex;align-items:center;gap:8px;font-size:12px;}
.audience-cb{width:15px;height:15px;border:1.5px solid var(--border2);border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.audience-cb.ck{background:var(--gold);border-color:var(--gold);}
.audience-cb.ck::after{content:'★';font-size:9px;color:#1a1712;}
.audience-label{color:var(--text2);}
/* Match add btn */
.match-add-row{padding:0 14px 10px;}
/* Opp section */
.opp-section{border-top:1px solid var(--border);}
.opp-hdr{padding:7px 14px;display:flex;align-items:center;justify-content:space-between;}
.opp-title{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;}
.opp-fold-btn{font-size:10px;color:var(--text3);background:none;border:none;padding:2px 5px;}
.opp-fold-btn:hover{color:var(--text2);}
/* Opp row: coin | class | result | btag | date | gear */
.opp-row{display:grid;grid-template-columns:28px 38px 28px 1fr auto 22px;gap:4px;align-items:center;padding:5px 10px;border-top:1px solid var(--border);font-size:12px;}
.opp-row:hover{background:var(--bg3);}
.opp-coin{text-align:center;cursor:pointer;font-size:13px;font-weight:700;user-select:none;}
.opp-coin.first{color:#4a8fd4;}
.opp-coin.second{color:#c8963e;}
.opp-cls-sel{font-size:11px;background:var(--bg3);border:1px solid var(--border);border-radius:3px;padding:2px 3px;width:100%;}
.opp-cls-sel:focus{border-color:var(--gold);outline:none;}
.opp-result-tog{text-align:center;font-size:11px;font-weight:700;padding:2px 4px;border-radius:3px;cursor:pointer;user-select:none;min-width:24px;}
.opp-result-tog.W{background:rgba(77,184,112,.2);color:var(--win);}
.opp-result-tog.L{background:rgba(212,68,68,.15);color:var(--loss);}
.opp-result-tog.Q{background:var(--bg3);color:var(--text3);border:1px dashed var(--border);}
.opp-btag{font-size:11px;background:var(--bg3);border:none;border-radius:3px;padding:2px 5px;width:100%;color:var(--text2);}
.opp-btag::placeholder{color:var(--text3);}
.opp-btag:focus{outline:1px solid var(--gold);color:var(--text1);}
.opp-date{font-size:9px;color:var(--text3);white-space:nowrap;flex-shrink:0;}
.opp-gear{background:none;border:none;color:var(--text3);font-size:12px;padding:2px;}
.opp-gear:hover{color:var(--text1);}

/* Complete overlay */
.complete-overlay{position:absolute;inset:0;background:rgba(26,23,18,.93);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;border-radius:var(--rlg);backdrop-filter:blur(3px);z-index:10;}
.co-icon{font-size:44px;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.co-score{font-family:var(--ft);font-size:28px;font-weight:700;}
.co-score.g{color:var(--gold);}
.co-score.r{color:var(--red);}
.co-msg{font-size:12px;color:var(--text2);}

/* Collapsed deck */
.deck-collapsed{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rlg);padding:10px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;}
.deck-collapsed:hover{border-color:var(--border2);}
.dc-info{flex:1;font-size:13px;}
.dc-score{font-family:var(--ft);font-size:13px;}
.dc-score.g{color:var(--gold);}
.dc-score.r{color:var(--red);}
.dc-class{color:var(--text2);font-size:12px;}
.dc-date{font-size:11px;color:var(--text3);margin-left:auto;}
.dc-expand{font-size:11px;color:var(--text3);}

/* No deck */
.no-deck{background:var(--bg2);border:1px dashed var(--border);border-radius:var(--rlg);padding:28px 14px;text-align:center;color:var(--text3);margin-bottom:8px;}
.no-deck p{margin-bottom:10px;font-size:13px;}

/* ── HISTORY PAGE ── */
.hist-section{margin-bottom:1rem;}
.hist-controls{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-bottom:10px;}
.filter-chip{padding:3px 9px;border:1px solid var(--border);border-radius:20px;background:none;font-size:11px;color:var(--text2);}
.filter-chip:hover{border-color:var(--border2);color:var(--text1);}
.filter-chip.active{border-color:var(--gold);color:var(--gold);background:rgba(200,168,75,.1);}
.filter-chip.acc-T.active{border-color:var(--t-acc);color:var(--t-acc);}
.filter-chip.acc-H.active{border-color:var(--h-acc);color:var(--h-acc);}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:7px;margin-bottom:12px;}
.scard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:9px 12px;}
.scard .val{font-family:var(--ft);font-size:17px;color:var(--gold);}
.scard .lbl{font-size:11px;color:var(--text2);margin-top:2px;}
.hist-table{width:100%;border-collapse:collapse;}
.hist-table th{background:var(--bg3);font-size:11px;color:var(--text2);font-weight:500;text-align:left;padding:7px 10px;border-bottom:1px solid var(--border);white-space:nowrap;}
.hist-table td{padding:7px 10px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle;}
.hist-table tr:last-child td{border-bottom:none;}
.hist-table tr:hover td{background:var(--bg3);}
.hist-table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rlg);overflow:hidden;}
.hs.g{font-family:var(--ft);color:var(--gold);}
.hs.gr{font-family:var(--ft);color:var(--green);}
.hs.r{font-family:var(--ft);color:var(--red);}
.acc-badge{font-size:10px;padding:1px 5px;border-radius:3px;}
.acc-badge.T{color:var(--t-acc);background:rgba(74,143,212,.12);}
.acc-badge.H{color:var(--h-acc);background:rgba(200,150,62,.12);}
/* Expandable hist row */
.hist-detail-row td{background:var(--bg1);padding:8px 12px;font-size:11px;color:var(--text2);}
.match-chips{display:flex;gap:3px;flex-wrap:wrap;}
.mchip{padding:2px 5px;border-radius:3px;font-size:11px;display:inline-flex;align-items:center;gap:2px;}
.mchip.W{background:rgba(77,184,112,.18);color:var(--win);}
.mchip.L{background:rgba(212,68,68,.15);color:var(--loss);}
.mchip.coin-f{border-left:2px solid #4a8fd4;}
.mchip.coin-s{border-left:2px solid #c8963e;}

/* ── RATING PAGE ── */
.rating-page{padding:.5rem 0;}
.rating-chart-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rlg);padding:16px;margin-bottom:12px;}
.rating-chart-title{font-family:var(--ft);font-size:12px;color:var(--gold);letter-spacing:.06em;margin-bottom:12px;}
canvas{width:100%;height:180px;display:block;}
.rating-log{display:flex;flex-direction:column;gap:4px;max-height:280px;overflow-y:auto;}
.rating-log-item{display:flex;align-items:center;gap:10px;padding:5px 10px;background:var(--bg3);border-radius:var(--r);font-size:12px;}
.rl-date{color:var(--text3);font-size:10px;white-space:nowrap;}
.rl-val{font-family:var(--ft);font-size:14px;color:var(--gold);}
.rl-acc{font-size:10px;}
.rl-del{background:none;border:none;color:var(--text3);font-size:11px;margin-left:auto;}
.rl-del:hover{color:var(--red);}
.rating-add-row{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;align-items:center;}

/* ── MEMO PAGE ── */
.memo-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rlg);padding:14px;}
.memo-area{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;font-size:13px;resize:vertical;min-height:320px;color:var(--text1);line-height:1.7;}
.memo-area::placeholder{color:var(--text3);}
.memo-area:focus{border-color:var(--gold);outline:none;}

/* ── POPUP ── */
.popup-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:900;backdrop-filter:blur(3px);}
.popup{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rlg);padding:18px 20px;width:400px;max-width:96vw;max-height:92vh;overflow-y:auto;}
.popup h3{font-family:var(--ft);font-size:13px;color:var(--gold);margin-bottom:12px;letter-spacing:.05em;}
.pf{margin-bottom:8px;}
.pf label{font-size:11px;color:var(--text2);display:block;margin-bottom:3px;}
.pf input,.pf select,.pf textarea{width:100%;}
.pf textarea{height:50px;resize:vertical;padding:6px 8px;font-size:12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text1);}
.pf textarea::placeholder{color:var(--text3);}
.pf textarea:focus{border-color:var(--gold);outline:none;}
.pbtn-row{display:flex;gap:6px;justify-content:flex-end;margin-top:12px;}
.pgrid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

/* ── MOBILE ── */
@media(max-width:680px){
  .quest-grid{grid-template-columns:1fr 1fr;gap:8px;}
  .quest-col:nth-child(4){grid-column:1/-1;}
  .opp-row{grid-template-columns:28px 36px 26px 1fr auto 20px;gap:3px;font-size:11px;}
  .rating-chart-title{font-size:11px;}
  .stab{padding:4px 9px;font-size:11px;}
}
@media(max-width:400px){
  .quest-grid{grid-template-columns:1fr;}
  .quest-col:nth-child(n){grid-column:auto;}
  .rating-row{gap:5px;}
}
</style>
</head>
<body>
<div class="app">

<!-- HEADER -->
<div class="hdr">
  <div class="logo">ARENA QUEST</div>
  <div class="hdr-btns">
    <button class="btn sm active" id="nav-main" onclick="showPage('main',this)">🃏 덱/퀘스트</button>
    <button class="btn sm" id="nav-rating" onclick="showPage('rating',this)">📈 평점</button>
    <button class="btn sm" id="nav-records" onclick="showPage('records',this)">📜 전체기록</button>
    <button class="btn sm" id="nav-memo" onclick="showPage('memo',this)">📝 메모</button>
  </div>

<div class="popup-bg" id="rewardPopup" style="display:none" onclick="if(event.target===this)closePopup('rewardPopup')">

<!-- POPUP: Match Detail -->
<div class="popup-bg" id="matchDetailPopup" style="display:none" onclick="if(event.target===this)closePopup('matchDetailPopup')">
  <div class="popup">
    <h3>매치 상세</h3>
    <div class="pgrid2">
      <div class="pf"><label>상대 배틀태그</label><input type="text" id="md_btag" placeholder="닉네임#1234"></div>
      <div class="pf"><label>상대 전설 카드</label><input type="text" id="md_oppleg" placeholder="예: 렉사르"></div>

      <button class="btn red sm" onclick="deleteMatchFromPopup()">매치 삭제</button>
      <button class="btn sm" onclick="closePopup('matchDetailPopup')">취소</button>

<div class="popup-bg" id="histDetailPopup" style="display:none" onclick="if(event.target===this)closePopup('histDetailPopup')">
  <div class="popup" style="width:520px">
    <h3 id="hd_title">덱 상세</h3>
    <div id="hd_body"></div>
    <div class="pbtn-row">
      <button class="btn red sm" id="hd_del" onclick="deleteHistEntry()">기록 삭제</button>
      <button class="btn sm" onclick="closePopup('histDetailPopup')">닫기</button>
    </div>
  </div>
</div>

<script>
/* ════════════════════════════════════
   CONSTANTS
════════════════════════════════════ */
const ACCOUNTS=['T','H'];
const SERVERS=['NA','EU','ASIA'];
const RESET_KST={ASIA:1,EU:7,NA:16};
const MAX_W=12,MAX_L=3;
const CLS2=['전사','성기사','사냥꾼','도적','사제','주술사','마법사','흑마법사','드루이드','악마사냥꾼','죽음의기사'];
// 2글자 축약 순서: 죽기 악사 드루 냥꾼 법사 기사 사제 도적 술사 흑마 전사
const CLS_ORDER=['죽음의기사','악마사냥꾼','드루이드','사냥꾼','마법사','성기사','사제','도적','주술사','흑마법사','전사'];
const CLS_SHORT={'전사':'전사','성기사':'기사','사냥꾼':'냥꾼','도적':'도적','사제':'사제','주술사':'술사','마법사':'법사','흑마법사':'흑마','드루이드':'드루','악마사냥꾼':'악사','죽음의기사':'죽기'};
const CLS_OPTS=CLS_ORDER.map(c=>`<option value="${c}">${CLS_SHORT[c]||c}</option>`).join('');

/* ════════════════════════════════════
   STATE
════════════════════════════════════ */
let curAcc='T',curSrv='NA',curPage='main';
let qeCtx=null,mdCtx=null,hdCtx=null,rwCtx=null;
let audienceCbChecked=false;
let foldedOpps=false;
let dragQiCtx=null;
let progEditCtx=null;
let ratingCurAcc='T',ratingCurSrv='NA';

/* ════════════════════════════════════
   STORAGE
════════════════════════════════════ */
const K=(a,s,k)=>`hs3_${a}_${s}_${k}`;
const GK=k=>`hs3_g_${k}`;
function gd(k,d){try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):d;}catch(e){return d;}}
function sd(k,v){localStorage.setItem(k,JSON.stringify(v));}

function getDeck(a,s){return gd(K(a,s,'deck'),null);}
function saveDeck(a,s,d){sd(K(a,s,'deck'),d);}
function getMeta(a,s){return gd(K(a,s,'meta'),{rating:''});}
function saveMeta(a,s,m){sd(K(a,s,'meta'),m);}
function getQuests(a,s){return gd(K(a,s,'quests'),defaultQuests());}
function saveQuests(a,s,q){sd(K(a,s,'quests'),q);}
function getHistory(){return gd(GK('history'),[]);}
function saveHistory(h){sd(GK('history'),h);}
function getRatingLog(){return gd(GK('ratings'),[]);}
function saveRatingLog(r){sd(GK('ratings'),r);}
function getMemo(){return gd(GK('memo'),'');}
function saveMemoData(t){sd(GK('memo'),t);}
function getEventXP(a,s){return gd(K(a,s,'eventxp'),{cur:0,max:0});}
function saveEventXP(a,s,x){sd(K(a,s,'eventxp'),x);}

function defaultQuests(){
  return {
    daily:[
      {id:'d1',text:'야수 12장 내기',target:12,prog:0,done:false},
      {id:'d2',text:'도적/주술사/흑마 3판 완료',target:3,prog:0,done:false},
    ],
    weekly:[
      {id:'w1',text:'대격변 카드 내기 75장',target:75,prog:0,done:false},
      {id:'w2',text:'아레나 5승',target:5,prog:0,done:false},
      {id:'w3',text:'하수인 파괴 25개',target:25,prog:0,done:false},
    ],
    event:[
      {id:'e1',text:'기본 모드 주문 400회',target:400,prog:0,done:false},
    ]
  };
}

/* ════════════════════════════════════
   DECK OPS
════════════════════════════════════ */
function newDeck(a,s,cls){
  return {id:'dk_'+Date.now(),acc:a,srv:s,cls:cls||'전사',myLeg:'',wins:0,losses:0,
    opponents:[],note:'',createdAt:new Date().toISOString(),reward:null,audienceBonus:false};
}
function addNewDeck(){
  const a=curAcc,s=curSrv;
  const existing=getDeck(a,s);
  if(existing){if(!confirm(`${a}-${s}에 진행중인 덱이 있습니다. 새 덱 시작 시 기록에 저장됩니다.`))return;finalizeDeck(a,s,'abandon');}
  saveDeck(a,s,newDeck(a,s,CLS_ORDER[0]));render();
}
function finalizeDeck(a,s,reason,reward){
  const deck=getDeck(a,s);if(!deck)return;
  const hist=getHistory();
  hist.unshift({...deck,reason:reason||'complete',reward:reward||null,completedAt:new Date().toISOString()});
  saveHistory(hist);sd(K(a,s,'deck'),null);
}
function promptReward(a,s){
  rwCtx={a,s};
  ['rw_gold','rw_pack','rw_ticket','rw_etc','rw_note'].forEach(id=>document.getElementById(id).value='');
  audienceCbChecked=false;updateAudienceCb();
  showPopup('rewardPopup');
  setTimeout(()=>document.getElementById('rw_gold').focus(),50);
}
function toggleAudienceCb(){audienceCbChecked=!audienceCbChecked;updateAudienceCb();}
function updateAudienceCb(){
  const el=document.getElementById('audience_cb');
  if(!el)return;
  el.innerHTML=audienceCbChecked?'<span style="font-size:10px;color:#1a1712">★</span>':'';
  el.style.background=audienceCbChecked?'var(--gold)':'';
  el.style.borderColor=audienceCbChecked?'var(--gold)':'var(--border2)';
}
function saveReward(){
  const {a,s}=rwCtx||{};if(!a)return;
  const reward={gold:parseInt(document.getElementById('rw_gold').value)||0,
    pack:parseInt(document.getElementById('rw_pack').value)||0,
    ticket:parseInt(document.getElementById('rw_ticket').value)||0,
    audienceBonus:audienceCbChecked,
    etc:document.getElementById('rw_etc').value.trim(),
    note:document.getElementById('rw_note').value.trim()};
  closePopup('rewardPopup');finalizeDeck(a,s,'complete',reward);rwCtx=null;render();
}

/* ════════════════════════════════════
   SCORE (via pips only now, no auto-match-add)
════════════════════════════════════ */
function changeW(a,s,d){
  const deck=getDeck(a,s);if(!deck)return;
  deck.wins=Math.max(0,Math.min(MAX_W,deck.wins+d));
  if(d>0&&deck.wins>=MAX_W){saveDeck(a,s,deck);setTimeout(()=>promptReward(a,s),400);render();return;}
  saveDeck(a,s,deck);render();
}
function changeL(a,s,d){
  const deck=getDeck(a,s);if(!deck)return;
  deck.losses=Math.max(0,Math.min(MAX_L,deck.losses+d));
  if(d>0&&deck.losses>=MAX_L){saveDeck(a,s,deck);setTimeout(()=>promptReward(a,s),400);render();return;}
  saveDeck(a,s,deck);render();
}

/* ════════════════════════════════════
   MATCH OPS
════════════════════════════════════ */
function mkMatch(){
  return {id:'m_'+Date.now()+Math.random(),result:'Q',coin:'first',cls:'',btag:'',oppLeg:'',note:'',matchAt:new Date().toISOString()};
}
function addMatch(a,s){
  const deck=getDeck(a,s);if(!deck)return;
  deck.opponents.unshift(mkMatch()); // newest first in storage too
  saveDeck(a,s,deck);render();
}
function updateMatch(a,s,idx,field,val){
  const deck=getDeck(a,s);if(!deck)return;
  deck.opponents[idx][field]=val;
  saveDeck(a,s,deck);
}
function toggleMatchCoin(a,s,idx){
  const deck=getDeck(a,s);if(!deck)return;
  deck.opponents[idx].coin=deck.opponents[idx].coin==='first'?'second':'first';
  saveDeck(a,s,deck);render();
}
function toggleMatchResult(a,s,idx){
  const deck=getDeck(a,s);if(!deck)return;
  const cur=deck.opponents[idx].result;
  deck.opponents[idx].result=cur==='Q'?'W':cur==='W'?'L':'Q';
  saveDeck(a,s,deck);render();
}
function openMatchDetail(a,s,idx){
  const deck=getDeck(a,s);if(!deck)return;
  const m=deck.opponents[idx];
  mdCtx={a,s,idx};
  document.getElementById('md_btag').value=m.btag||'';
  document.getElementById('md_oppleg').value=m.oppLeg||'';
  document.getElementById('md_note').value=m.note||'';
  showPopup('matchDetailPopup');
}
function saveMatchDetail(){
  if(!mdCtx)return;
  const {a,s,idx}=mdCtx;
  const deck=getDeck(a,s);if(!deck)return;
  Object.assign(deck.opponents[idx],{
    btag:document.getElementById('md_btag').value.trim(),
    oppLeg:document.getElementById('md_oppleg').value.trim(),
    note:document.getElementById('md_note').value.trim()
  });
  saveDeck(a,s,deck);closePopup('matchDetailPopup');render();
}
function deleteMatchFromPopup(){
  if(!mdCtx)return;
  const {a,s,idx}=mdCtx;
  const deck=getDeck(a,s);if(!deck)return;
  deck.opponents.splice(idx,1);
  saveDeck(a,s,deck);closePopup('matchDetailPopup');render();
}

/* ════════════════════════════════════
   QUEST OPS
════════════════════════════════════ */
function toggleQuest(a,s,type,idx){
  const q=getQuests(a,s);const item=q[type][idx];
  if(item.target>0){item.prog=item.prog>=item.target?0:item.target;item.done=item.prog>=item.target;}
  else{item.done=!item.done;}
  saveQuests(a,s,q);renderQuests();
}
function addQuestItem(a,s,type){
  const q=getQuests(a,s);
  q[type].push({id:'q_'+Date.now(),text:'새 퀘스트',target:0,prog:0,done:false});
  saveQuests(a,s,q);renderQuests();
}
function openQuestEdit(a,s,type,idx){
  const q=getQuests(a,s);const item=q[type][idx];
  qeCtx={a,s,type,idx};
  document.getElementById('qe_text').value=item.text;
  document.getElementById('qe_target').value=item.target;
  showPopup('questEditPopup');
  setTimeout(()=>document.getElementById('qe_text').focus(),50);
}
function saveQuestEdit(){
  if(!qeCtx)return;
  const {a,s,type,idx}=qeCtx;
  const q=getQuests(a,s);
  q[type][idx].text=document.getElementById('qe_text').value.trim()||'퀘스트';
  q[type][idx].target=parseInt(document.getElementById('qe_target').value)||0;
  if(!q[type][idx].target)q[type][idx].prog=0;
  saveQuests(a,s,q);closePopup('questEditPopup');renderQuests();
}
function deleteQuestItem(){
  if(!qeCtx)return;
  const {a,s,type,idx}=qeCtx;
  const q=getQuests(a,s);q[type].splice(idx,1);
  saveQuests(a,s,q);closePopup('questEditPopup');renderQuests();
}
function deleteQuestDirect(a,s,type,idx){
  if(!confirm('이 퀘스트를 삭제할까요?'))return;
  const q=getQuests(a,s);q[type].splice(idx,1);
  saveQuests(a,s,q);renderQuests();
}

/* ── Progress editing ── */
function startProgEdit(a,s,type,idx){
  progEditCtx={a,s,type,idx};renderQuests();
  setTimeout(()=>{const el=document.getElementById(`pe_${a}_${s}_${type}_${idx}`);if(el){el.focus();el.select();}},0);
}
function commitProgEdit(a,s,type,idx,el){
  const q=getQuests(a,s);const val=parseInt(el.value);
  if(!isNaN(val)){q[type][idx].prog=Math.max(0,Math.min(q[type][idx].target,val));q[type][idx].done=q[type][idx].prog>=q[type][idx].target;saveQuests(a,s,q);}
  progEditCtx=null;renderQuests();
}
function progWheel(e,a,s,type,idx){
  e.preventDefault();
  const q=getQuests(a,s);const item=q[type][idx];
  item.prog=Math.max(0,Math.min(item.target,item.prog+(e.deltaY<0?1:-1)));
  item.done=item.prog>=item.target;saveQuests(a,s,q);renderQuests();
}

/* ── Drag & drop ── */
function qiDragStart(e,type,idx){dragQiCtx={type,idx};e.dataTransfer.effectAllowed='move';}
function qiDragOver(e,type,idx){e.preventDefault();document.querySelectorAll('.qi[data-qi]').forEach(el=>{const[t,i]=el.dataset.qi.split(':');el.classList.toggle('drag-over',t===type&&+i===idx&&idx!==dragQiCtx?.idx);});}
function qiDrop(e,a,s,type,toIdx){
  e.preventDefault();document.querySelectorAll('.qi').forEach(el=>el.classList.remove('drag-over'));
  if(!dragQiCtx||dragQiCtx.type!==type||dragQiCtx.idx===toIdx)return;
  const q=getQuests(a,s);const arr=q[type];const[m]=arr.splice(dragQiCtx.idx,1);arr.splice(toIdx,0,m);
  saveQuests(a,s,q);dragQiCtx=null;renderQuests();
}
function qiDragEnd(){dragQiCtx=null;document.querySelectorAll('.qi').forEach(el=>el.classList.remove('drag-over'));}

/* ════════════════════════════════════
   RATING LOG
════════════════════════════════════ */
function addRatingEntry(){
  const val=parseFloat(document.getElementById('ratingInput').value);
  if(!val)return;
  const a=document.getElementById('ratingAcc').value;
  const s=document.getElementById('ratingSrv').value;
  const log=getRatingLog();
  log.push({val,acc:a,srv:s,at:new Date().toISOString()});
  saveRatingLog(log);
  document.getElementById('ratingInput').value='';
  renderRatingPage();
}
function deleteRatingEntry(idx){
  const log=getRatingLog();log.splice(idx,1);saveRatingLog(log);renderRatingPage();
}

/* ════════════════════════════════════
   RENDER: TABS
════════════════════════════════════ */
function renderTabs(containerId='tabRow'){
  let h='';
  ACCOUNTS.forEach((a,ai)=>{
    if(ai>0)h+=`<div class="tab-sep"></div>`;
    h+=`<span class="acc-label" style="color:${a==='T'?'var(--t-acc)':'var(--h-acc)'}">${a}</span>`;
    SERVERS.forEach(s=>{
      const hasDeck=!!getDeck(a,s);
      const isActive=a===curAcc&&s===curSrv;
      h+=`<button class="stab acc-${a}${isActive?' active':''}" onclick="curAcc='${a}';curSrv='${s}';render()">
        <span class="dot${hasDeck?' has-deck':''}"></span>${s}
      </button>`;
    });
  });
  const el=document.getElementById(containerId);if(el)el.innerHTML=h;
}

/* ════════════════════════════════════
   RENDER: RATING ROW (per-server ratings)
════════════════════════════════════ */
function renderRatingRow(){
  const cells=SERVERS.map(s=>{
    let row='';
    ACCOUNTS.forEach(a=>{
      const m=getMeta(a,s);
      row+=`<div class="rating-cell">
        <span class="acc-dot" style="background:${a==='T'?'var(--t-acc)':'var(--h-acc)'}"></span>
        <label>${a}</label>
        <input type="text" value="${m.rating||''}" placeholder="—"
          onchange="saveMetaField('${a}','${s}','rating',this.value)"
          onkeydown="if(event.key==='Enter')this.blur()"
          style="width:50px">
      </div>`;
    });
    return `<div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
      <span style="font-size:10px;color:var(--text3);font-family:var(--ft);letter-spacing:.05em">${s}</span>${row}
    </div>`;
  }).join('<div style="width:1px;height:20px;background:var(--border);margin:0 4px"></div>');
  document.getElementById('ratingRow').innerHTML=`<div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">${cells}</div>`;
}
function saveMetaField(a,s,field,val){
  const m=getMeta(a,s);m[field]=val;saveMeta(a,s,m);
}

/* ════════════════════════════════════
   RENDER: QUESTS
════════════════════════════════════ */
function renderQuests(){
  const a=curAcc,s=curSrv;
  const q=getQuests(a,s);
  const xp=getEventXP(a,s);

  function makeQi(item,type,idx){
    if(!item)return`<div class="qi-empty"><span>빈 슬롯</span></div>`;
    const isDone=item.target>0?item.prog>=item.target:item.done;
    const isEditing=progEditCtx&&progEditCtx.a===a&&progEditCtx.s===s&&progEditCtx.type===type&&progEditCtx.idx===idx;
    const pct=item.target>0?Math.min(100,Math.round(item.prog/item.target*100)):0;
    let progHtml='';
    if(item.target>0){
      if(isEditing){
        progHtml=`<div class="qi-prog-row">
          <div class="prog-bar-wrap"><div class="prog-bar-fill" style="width:${pct}%"></div></div>
          <input class="prog-input" id="pe_${a}_${s}_${type}_${idx}" type="number" min="0" max="${item.target}" value="${item.prog}"
            onblur="commitProgEdit('${a}','${s}','${type}',${idx},this)"
            onkeydown="if(event.key==='Enter')commitProgEdit('${a}','${s}','${type}',${idx},this);if(event.key==='Escape'){progEditCtx=null;renderQuests();}">
          <span class="prog-sep">/</span><span class="prog-target-txt">${item.target}</span>
        </div>`;
      }else{
        progHtml=`<div class="qi-prog-row" id="pdisp_${a}_${s}_${type}_${idx}">
          <div class="prog-bar-wrap"><div class="prog-bar-fill" style="width:${pct}%"></div></div>
          <span class="prog-text" onclick="startProgEdit('${a}','${s}','${type}',${idx})" title="클릭 편집, 휠 조정">${item.prog}</span>
          <span class="prog-sep">/</span><span class="prog-target-txt">${item.target}</span>
        </div>`;
      }
    }
    return `<div class="qi${isDone?' done':''}" data-qi="${type}:${idx}" draggable="true"
      ondragstart="qiDragStart(event,'${type}',${idx})" ondragover="qiDragOver(event,'${type}',${idx})"
      ondrop="qiDrop(event,'${a}','${s}','${type}',${idx})" ondragend="qiDragEnd()">
      <div class="qi-top">
        <div class="qi-cb${isDone?' ck':''}" onclick="toggleQuest('${a}','${s}','${type}',${idx})"></div>
        <div class="qi-text">${item.text}</div>
        <div class="qi-actions">
          <button class="qi-edit-btn" onclick="openQuestEdit('${a}','${s}','${type}',${idx})" title="편집">✎</button>
          <button class="qi-del-btn" onclick="deleteQuestDirect('${a}','${s}','${type}',${idx})" title="삭제">✕</button>
        </div>
      </div>
      ${progHtml}
    </div>`;
  }

  // Daily: 3 slots max
  const dailySlots=3;const dailyItems=[...q.daily];
  while(dailyItems.length<dailySlots)dailyItems.push(null);

  const dailyHtml=dailyItems.slice(0,dailySlots).map((item,i)=>makeQi(item,'daily',i)).join('');
  const weeklyHtml=q.weekly.map((item,i)=>makeQi(item,'weekly',i)).join('');
  const eventHtml=q.event.map((item,i)=>makeQi(item,'event',i)).join('');

  document.getElementById('questGrid').innerHTML=`
    <div class="quest-col">
      <div class="quest-col-label">일일</div>
      <div class="quest-slots" id="qs_daily">${dailyHtml}</div>
      <button style="margin-top:5px;width:100%;padding:4px;background:none;border:1px dashed var(--border);border-radius:5px;cursor:pointer;font-size:11px;color:var(--text3)" onclick="addQuestItem('${a}','${s}','daily')">+</button>
    </div>
    <div class="quest-col">
      <div class="quest-col-label">주간</div>
      <div class="quest-slots" id="qs_weekly">${weeklyHtml}</div>
      <button style="margin-top:5px;width:100%;padding:4px;background:none;border:1px dashed var(--border);border-radius:5px;cursor:pointer;font-size:11px;color:var(--text3)" onclick="addQuestItem('${a}','${s}','weekly')">+</button>
    </div>
    <div class="quest-col">
      <div class="quest-col-label">이벤트</div>
      <div class="quest-slots" id="qs_event">${eventHtml}</div>
      <button style="margin-top:5px;width:100%;padding:4px;background:none;border:1px dashed var(--border);border-radius:5px;cursor:pointer;font-size:11px;color:var(--text3)" onclick="addQuestItem('${a}','${s}','event')">+</button>
    </div>
    <div class="quest-col">
      <div class="quest-col-label">이벤트 XP</div>
      <div style="padding-top:4px">
        <div class="event-xp-row" style="flex-direction:column;align-items:flex-start;gap:4px">
          <label style="font-size:11px;color:var(--text2)">현재 / 목표</label>
          <div style="display:flex;gap:5px;align-items:center">
            <input type="number" value="${xp.cur||0}" min="0" style="width:60px" onchange="saveXP('${a}','${s}','cur',this.value)" onkeydown="if(event.key==='Enter')this.blur()">
            <span style="color:var(--text3)">/</span>
            <input type="number" value="${xp.max||0}" min="0" style="width:60px" onchange="saveXP('${a}','${s}','max',this.value)" onkeydown="if(event.key==='Enter')this.blur()">
          </div>
          ${xp.max>0?`<div style="width:100%;height:5px;background:var(--bg4);border-radius:3px;margin-top:3px"><div style="height:100%;background:var(--gold);border-radius:3px;width:${Math.min(100,Math.round((xp.cur||0)/(xp.max||1)*100))}%"></div></div>`:''}
        </div>
      </div>
    </div>
  `;

  // Wheel listeners
  setTimeout(()=>{
    ['daily','weekly','event'].forEach(type=>{
      const items=getQuests(a,s)[type]||[];
      items.forEach((item,idx)=>{
        if(!item||!item.target)return;
        const el=document.getElementById(`pdisp_${a}_${s}_${type}_${idx}`);
        if(el)el.addEventListener('wheel',e=>progWheel(e,a,s,type,idx),{passive:false});
      });
    });
  },0);
}
function saveXP(a,s,field,val){
  const x=getEventXP(a,s);x[field]=parseInt(val)||0;saveEventXP(a,s,x);renderQuests();
}

  area.innerHTML=`<div class="deck-card">
    ${completeOverlay}

      <select class="class-sel" onchange="updateDeckField('${a}','${s}','cls',this.value)">${clsOpts}</select>
      <input class="deck-my-legend" type="text" placeholder="내 전설 카드" value="${(deck.myLeg||'').replace(/"/g,'&quot;')}"
        oninput="updateDeckField('${a}','${s}','myLeg',this.value)">
      <span class="deck-badge ${isComplete?(deck.wins>=MAX_W?'done-win':'done-loss'):'active'}">${isComplete?(deck.wins>=MAX_W?'12승':'3패 종료'):'진행중'}</span>
      <span style="font-size:10px;color:var(--text3)">${new Date(deck.createdAt).toLocaleDateString('ko-KR')}</span>
    </div>
    <div class="score-wrap">
      <div class="score-blk">
        <span class="score-lbl">승리</span>
        <div class="pips">${wPips}</div>
        <div class="score-ctrl">
          <button class="sc-btn lb" onclick="changeW('${a}','${s}',-1)" ${deck.wins<=0?'disabled':''}>−</button>
          <div class="sc-val wv" id="scW_${a}_${s}">${deck.wins}</div>
          <button class="sc-btn wb" onclick="changeW('${a}','${s}',1)" ${deck.wins>=MAX_W||isComplete?'disabled':''}>+</button>
        </div>

      <div class="score-sep">/</div>

        <span class="score-lbl">패배</span>
        <div class="pips">${lPips}</div>

  setTimeout(()=>{

    if(lv)lv.addEventListener('wheel',e=>{e.preventDefault();changeL(a,s,e.deltaY<0?1:-1);},{passive:false});
  },0);
}

function drawRatingChart(log){
  const canvas=document.getElementById('ratingCanvas');
  const dpr=window.devicePixelRatio||1;
  const W=canvas.parentElement.clientWidth-32||400;
  const H=160;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,H);
  if(!log.length){
    ctx.fillStyle='rgba(106,90,72,.5)';ctx.font='12px Noto Sans KR';ctx.textAlign='center';
    ctx.fillText('평점을 기록하면 그래프가 표시됩니다',W/2,H/2);return;
  }
  const vals=log.map(r=>r.val);
  const mn=Math.min(...vals),mx=Math.max(...vals);
  const pad=20,padB=24,padT=12;
  const gW=W-pad*2,gH=H-padB-padT;
  const xStep=log.length>1?gW/(log.length-1):0;
  const toX=i=>pad+i*xStep;
  const toY=v=>padT+gH-(mx===mn?gH/2:((v-mn)/(mx-mn))*gH);

  // Grid lines
  ctx.strokeStyle='rgba(74,64,53,.5)';ctx.lineWidth=.8;
  [0,.25,.5,.75,1].forEach(t=>{
    const y=padT+gH*(1-t);
    ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(W-pad,y);ctx.stroke();
    const lbl=Math.round(mn+t*(mx-mn));
    ctx.fillStyle='rgba(106,90,72,.8)';ctx.font='10px Noto Sans KR';ctx.textAlign='right';
    ctx.fillText(lbl,pad-3,y+3);
  });

  // Line
  ctx.beginPath();ctx.moveTo(toX(0),toY(vals[0]));
  for(let i=1;i<vals.length;i++)ctx.lineTo(toX(i),toY(vals[i]));
  ctx.strokeStyle='rgba(200,168,75,.8)';ctx.lineWidth=2;ctx.lineJoin='round';ctx.stroke();

  // Fill
  ctx.beginPath();ctx.moveTo(toX(0),H-padB);
  for(let i=0;i<vals.length;i++)ctx.lineTo(toX(i),toY(vals[i]));
  ctx.lineTo(toX(vals.length-1),H-padB);ctx.closePath();
  ctx.fillStyle='rgba(200,168,75,.08)';ctx.fill();

  // Dots
  vals.forEach((v,i)=>{
    ctx.beginPath();ctx.arc(toX(i),toY(v),3,0,Math.PI*2);
    ctx.fillStyle='var(--gold)';ctx.fill();
  });

  // X labels (first/last + some)
  const showIdxs=log.length<=6?log.map((_,i)=>i):[0,...Array.from({length:4},(_,i)=>Math.round((i+1)*log.length/5)),log.length-1].filter((v,i,a)=>a.indexOf(v)===i);
  showIdxs.forEach(i=>{
    const dt=new Date(log[i].at);
    const lbl=`${dt.getMonth()+1}/${dt.getDate()}`;
    ctx.fillStyle='rgba(106,90,72,.8)';ctx.font='10px Noto Sans KR';ctx.textAlign='center';
    ctx.fillText(lbl,toX(i),H-padB+12);
  });
}

    const sc=h.wins>=12?'g':h.wins>=7?'gr':'r';
    const cd=h.completedAt?new Date(h.completedAt).toLocaleDateString('ko-KR'):'';
    const rew=h.reward;
    const rewStr=rew?[rew.gold?`🪙${rew.gold}`:'',rew.audienceBonus?'★':'',rew.pack?`📦${rew.pack}`:'',rew.ticket?`🎟${rew.ticket}`:'',rew.etc?rew.etc:''].filter(Boolean).join(' '):'—';
    // Win display: show full e.g. 12-0, 12-1, 12-2, or X-3
    const scoreDisp=`${h.wins}-${h.losses}`;
    return `<tr style="cursor:pointer" ondblclick="openHistDetail(${vi})">
      <td><span class="hs ${sc}">${scoreDisp}</span></td>
      <td><span class="acc-badge ${h.acc}">${h.acc}</span> <span style="font-size:10px;color:var(--text3)">${h.srv}</span></td>
      <td style="font-size:12px;color:var(--text2)">${CLS_SHORT[h.cls]||h.cls||'—'}</td>
      <td style="font-size:12px;color:var(--text2)">${h.myLeg||'—'}</td>
      <td style="font-size:11px;color:var(--text2)">${rewStr}</td>
      <td style="font-size:10px;color:var(--text3);white-space:nowrap">${cd}</td>
      <td><button class="btn xs red" onclick="event.stopPropagation();deleteHistEntry(${vi})">삭제</button></td>
    </tr>`;
  }).join('');

  document.getElementById('histTableWrap').innerHTML=`
    <table class="hist-table">
      <thead><tr>
        <th>결과</th><th>계정/서버</th><th>클래스</th><th>내 전설</th><th>보상</th><th>날짜</th><th></th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div style="font-size:11px;color:var(--text3);padding:8px 12px">더블클릭으로 상세 보기</div>`;

  // Store for popup reference
  window._filteredHist=filtered;
}

function openHistDetail(visIdx){
  const h=(window._filteredHist||[])[visIdx];
  if(!h)return;
  hdCtx={visIdx};
  document.getElementById('hd_title').textContent=`${h.acc} ${h.srv} — ${CLS_SHORT[h.cls]||h.cls||'?'} ${h.wins}-${h.losses}`;
  const rew=h.reward;
  const rewStr=rew?`골드:${rew.gold||0} 팩:${rew.pack||0} 입장권:${rew.ticket||0}${rew.audienceBonus?' ★관중호응':''}${rew.etc?' '+rew.etc:''}`:'보상 없음';
  // Matches
  const matches=(h.opponents||[]).map((m,i)=>`<div style="display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid var(--border);font-size:12px">
    <span style="font-size:10px;color:var(--text3);width:20px;text-align:right">${i+1}</span>
    <span class="${m.coin==='first'?'':''}` +
    `" style="color:${m.coin==='first'?'#4a8fd4':'#c8963e'};width:22px">${m.coin==='first'?'선':'후'}</span>
    <span style="width:28px;color:var(--text2)">${CLS_SHORT[m.cls]||m.cls||'?'}</span>
    <span style="width:22px;font-weight:700;color:${m.result==='W'?'var(--win)':m.result==='L'?'var(--loss)':'var(--text3)'}">${m.result==='W'?'승':m.result==='L'?'패':'?'}</span>
    <span style="color:var(--text2);flex:1">${m.btag||''}</span>
    ${m.oppLeg?`<span style="color:var(--text3)">상대전설:${m.oppLeg}</span>`:''}
    ${m.note?`<span style="color:var(--text3);font-size:11px">${m.note}</span>`:''}
    <span style="font-size:9px;color:var(--text3)">${m.matchAt?new Date(m.matchAt).toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}):''}</span>
  </div>`).join('');
  document.getElementById('hd_body').innerHTML=`
    <div style="margin-bottom:10px;font-size:12px;color:var(--text2)">${rewStr}</div>
    ${h.note?`<div style="margin-bottom:8px;font-size:12px;color:var(--text2)">메모: ${h.note}</div>`:''}
    <div style="font-size:11px;color:var(--text3);margin-bottom:5px">매치 기록 (${(h.opponents||[]).length}전)</div>
    ${matches||'<div style="color:var(--text3);font-size:12px">매치 기록 없음</div>'}`;
  showPopup('histDetailPopup');
}
function deleteHistEntry(visIdx){
  const filtered=window._filteredHist||[];
  const target=filtered[visIdx]||filtered[hdCtx?.visIdx];
  if(!target||!confirm('이 기록을 삭제할까요?'))return;
  const hist=getHistory();
  const newH=hist.filter(h=>h!==target&&!(h.id&&h.id===target.id));
  saveHistory(newH);closePopup('histDetailPopup');renderRecords();
}

/* ════════════════════════════════════
   MEMO
════════════════════════════════════ */
function saveMemo(){
  const t=document.getElementById('memoArea').value;
  saveMemoData(t);
  const btn=document.querySelector('.memo-wrap .btn');
  if(btn){btn.textContent='저장됨 ✓';setTimeout(()=>btn.textContent='저장 (Enter)',1200);}
}
function loadMemo(){
  const el=document.getElementById('memoArea');
  if(el)el.value=getMemo();
}

/* ════════════════════════════════════
   PAGE SWITCH
════════════════════════════════════ */
function showPage(name,btn){
  curPage=name;
  ['main','rating','records','memo'].forEach(p=>{
    document.getElementById('page'+p.charAt(0).toUpperCase()+p.slice(1)).classList.toggle('active',p===name);
    const nb=document.getElementById('nav-'+p);
    if(nb)nb.classList.toggle('active',p===name);
  });
  if(name==='records')renderRecords();
  if(name==='rating')renderRatingPage();
  if(name==='memo')loadMemo();
}

/* ════════════════════════════════════
   POPUPS
════════════════════════════════════ */
function showPopup(id){document.getElementById(id).style.display='flex';}
function closePopup(id){document.getElementById(id).style.display='none';}

/* ════════════════════════════════════
   KEYBOARD
════════════════════════════════════ */
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    ['rewardPopup','questEditPopup','matchDetailPopup','histDetailPopup'].forEach(id=>closePopup(id));
    if(progEditCtx){progEditCtx=null;renderQuests();}
  }
  // Reward popup Enter
  if(e.key==='Enter'&&document.getElementById('rewardPopup').style.display!=='none'){
    const active=document.activeElement?.tagName;
    if(active!=='TEXTAREA')saveReward();
  }
  if(curPage!=='main')return;
  const tag=document.activeElement?.tagName;
  if(tag==='INPUT'||tag==='SELECT'||tag==='TEXTAREA')return;
  const a=curAcc,s=curSrv;
  if(e.key==='ArrowUp'){e.preventDefault();changeW(a,s,1);}
  if(e.key==='ArrowDown'){e.preventDefault();changeW(a,s,-1);}
  if(e.key==='ArrowRight'){e.preventDefault();changeL(a,s,1);}
  if(e.key==='ArrowLeft'){e.preventDefault();changeL(a,s,-1);}
});

/* ════════════════════════════════════
   MAIN RENDER
════════════════════════════════════ */
function render(){
  renderTabs();
  renderRatingRow();
  renderDeck();
  renderQuests();
}

render();
setInterval(()=>{if(curPage==='main')renderRatingRow();},60000);
</script>
</body>
</html>
